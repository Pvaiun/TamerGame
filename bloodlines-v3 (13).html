<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bloodlines</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    user-select: none;
    -webkit-user-select: none;
    -ms-user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
  }
  /* Allow selection in text inputs and the battle log so the player can copy if they want */
  input, textarea, .battle-log {
    user-select: text;
    -webkit-user-select: text;
  }
  :root {
    --bg: #0a0a10;
    --panel: #16161e;
    --panel-2: #1f1f2a;
    --border: #2a2a38;
    --border-hi: #4a4a5e;
    --text: #e8e8ec;
    --text-dim: #8a8a98;
    --text-faint: #5a5a68;
    --accent: #d4a373;
    --accent-dim: #8a6a4a;
    --fire:  #ff7755;
    --water: #5599ff;
    --grass: #66cc77;
    --light: #ffe5a8;
    --dark:  #aa77cc;
    --hp: #c84a4a;
    --hp-bg: #2a1a1a;
    --eff-good: #5fc878;
    --eff-bad:  #c86a6a;
  }
  body {
    font-family: 'Courier New', 'Courier', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 16px;
    overflow-x: hidden;
  }
  #app { width: 100%; max-width: 920px; position: relative; }
  h1 { text-align: center; margin-bottom: 4px; font-size: 28px; letter-spacing: 6px; color: var(--accent); font-weight: 900; }
  .subtitle { text-align: center; color: var(--text-faint); margin-bottom: 20px; font-size: 11px; letter-spacing: 3px; }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 16px; margin-bottom: 12px; }
  .panel-title { font-size: 11px; letter-spacing: 3px; color: var(--accent); margin-bottom: 12px; text-transform: uppercase; }
  button { font-family: inherit; background: var(--panel-2); color: var(--text); border: 1px solid var(--border); padding: 10px 16px; cursor: pointer; border-radius: 3px; transition: all 0.12s; font-size: 13px; }
  button:hover:not(:disabled) { background: #2a2a38; border-color: var(--accent); transform: translateY(-1px); }
  button:active:not(:disabled) { transform: translateY(0); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.primary { background: linear-gradient(180deg, #5a4a2a, #4a3a1a); border-color: var(--accent); color: #fff; font-weight: bold; letter-spacing: 1px; }
  button.primary:hover:not(:disabled) { background: linear-gradient(180deg, #6a5a3a, #5a4a2a); }

  .header-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px; font-size: 11px; }
  .header-stat { background: var(--panel); padding: 8px 10px; border-radius: 3px; border: 1px solid var(--border); text-align: center; }
  .header-stat-label { color: var(--text-faint); font-size: 9px; letter-spacing: 2px; }
  .header-stat-value { font-weight: bold; font-size: 15px; color: var(--accent); margin-top: 2px; }

  .creature-card {
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 4px;
    padding: 10px; margin-bottom: 8px; cursor: default; transition: all 0.12s;
    display: grid; grid-template-columns: 72px 1fr; gap: 10px; align-items: stretch;
  }
  .creature-card.selectable { cursor: pointer; }
  .creature-card.selectable:hover { border-color: var(--accent); background: #25252f; }
  .creature-card.selected { border-color: var(--accent); background: #2a251f; box-shadow: 0 0 0 1px var(--accent) inset; }
  .creature-card.dimmed { opacity: 0.5; }
  .creature-portrait {
    width: 72px; height: 72px; background: #0d0d14; border-radius: 4px;
    display: flex; align-items: center; justify-content: center; border: 1px solid var(--border);
    overflow: hidden;
  }
  .creature-portrait svg { width: 100%; height: 100%; }
  .creature-info { min-width: 0; display: flex; flex-direction: column; gap: 4px; }
  .creature-header { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; min-width: 0; }
  .creature-name { font-weight: bold; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
  .creature-meta { font-size: 10px; letter-spacing: 1px; flex-shrink: 0; }
  .stat-row { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 3px; font-size: 10px; }
  .stat { background: #0d0d14; padding: 3px 2px; border-radius: 2px; text-align: center; border: 1px solid #1a1a22; min-width: 0; overflow: hidden; }
  .stat-label { color: var(--text-faint); font-size: 8px; letter-spacing: 1px; }
  .stat-value { color: var(--text); font-weight: bold; font-size: 11px; }
  .stat-growth { font-size: 9px; font-weight: bold; letter-spacing: 0; padding: 0 4px; border: 1px solid; border-radius: 2px; display: inline-block; margin-top: 2px; }
  .growth-bars { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 3px; margin-top: 2px; }
  .growth-bar { height: 3px; background: #0d0d14; border-radius: 1px; overflow: hidden; }
  .growth-fill { height: 100%; background: linear-gradient(90deg, #6a8a4a, #aacc66); }
  .level-line { font-size: 10px; color: var(--text-dim); }
  .xp-bar { height: 4px; background: #0d0d14; border-radius: 1px; overflow: hidden; margin-top: 2px; }
  .xp-fill { height: 100%; background: linear-gradient(90deg, #4a6a8a, #66aacc); transition: width 0.5s; }
  .passive-line { font-size: 10px; color: var(--accent); margin-top: 2px; line-height: 1.4; word-break: break-word; }
  .passive-line .passive-extra { color: #c8aacc; }

  /* inspectable cards (when not selectable) */
  .creature-card.inspectable { cursor: pointer; transition: border-color 0.12s; }
  .creature-card.inspectable:hover { border-color: var(--border-hi); }

  /* info button on selectable cards */
  .info-btn {
    background: transparent; border: 1px solid var(--border); color: var(--text-dim);
    width: 22px; height: 22px; padding: 0; border-radius: 50%; font-size: 13px;
    line-height: 1; flex-shrink: 0; cursor: pointer; transition: all 0.12s;
    display: flex; align-items: center; justify-content: center;
  }
  .info-btn:hover { color: var(--accent); border-color: var(--accent); transform: none; background: transparent; }

  /* inspect modal — extends .modal */
  .inspect-modal { max-width: 540px; max-height: 86vh; overflow-y: auto; padding: 18px; }
  .inspect-head { display: grid; grid-template-columns: 96px 1fr; gap: 14px; margin-bottom: 14px; align-items: center; }
  .inspect-portrait { width: 96px; height: 96px; background: #0d0d14; border-radius: 4px; border: 1px solid var(--border); overflow: hidden; }
  .inspect-portrait svg { width: 100%; height: 100%; }
  .inspect-headinfo { min-width: 0; }
  .inspect-name { font-size: 18px; font-weight: bold; color: var(--accent); letter-spacing: 1px; word-break: break-word; }
  .inspect-subhead { font-size: 11px; letter-spacing: 1px; color: var(--text-dim); margin-top: 4px; display: flex; align-items: center; flex-wrap: wrap; }
  .inspect-stats { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 6px; margin-bottom: 14px; }
  .inspect-stat { background: #0d0d14; border: 1px solid var(--border); border-radius: 3px; padding: 8px 6px; text-align: center; min-width: 0; overflow: hidden; }
  .inspect-stat-label { font-size: 9px; color: var(--text-faint); letter-spacing: 1px; }
  .inspect-stat-value { font-size: 16px; font-weight: bold; color: var(--text); margin: 4px 0; }
  .inspect-growth-bar { height: 4px; background: #050508; border-radius: 1px; overflow: hidden; margin-bottom: 4px; }
  .inspect-growth-fill { height: 100%; background: linear-gradient(90deg, #6a8a4a, #aacc66); }
  .inspect-growth-label { font-size: 8px; color: var(--text-faint); letter-spacing: 0.5px; }
  .inspect-rank-wrap { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 4px; }
  .inspect-rank-label { font-size: 8px; color: var(--text-faint); letter-spacing: 1px; }
  .inspect-rank-tag { font-size: 13px; font-weight: bold; border: 1px solid; padding: 1px 6px; border-radius: 3px; line-height: 1.2; }
  .inspect-rank-tag.rank-S { box-shadow: 0 0 8px rgba(255, 204, 68, 0.6); background: rgba(255, 204, 68, 0.08); }
  .inspect-section-title { font-size: 11px; letter-spacing: 3px; color: var(--accent); margin: 14px 0 6px; text-transform: uppercase; border-top: 1px solid var(--border); padding-top: 12px; }
  .inspect-section-title:first-of-type { /* keep border for consistency */ }
  .inspect-row { background: #0d0d14; border: 1px solid var(--border); border-radius: 3px; padding: 8px 10px; margin-bottom: 6px; }
  .inspect-row-name { font-weight: bold; font-size: 12px; color: var(--text); display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
  .inspect-row-desc { font-size: 11px; color: var(--text-dim); margin-top: 4px; line-height: 1.5; }
  .inspect-tag { font-size: 9px; letter-spacing: 1px; color: var(--text-faint); border: 1px solid var(--border); padding: 1px 5px; border-radius: 2px; margin-left: 6px; }

  /* ability tooltip modal */
  .ability-tooltip-modal { max-width: 380px; padding: 18px; }
  .tooltip-name { font-size: 18px; font-weight: bold; color: var(--accent); letter-spacing: 1px; margin-bottom: 12px; display: flex; align-items: center; }
  .tooltip-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 12px; }
  .tooltip-meta-cell { background: #0d0d14; border: 1px solid var(--border); border-radius: 3px; padding: 6px 8px; }
  .tooltip-meta-cell.wide { grid-column: 1 / -1; }
  .tooltip-meta-label { font-size: 9px; color: var(--text-faint); letter-spacing: 1.5px; }
  .tooltip-meta-val { font-size: 13px; color: var(--text); font-weight: bold; margin-top: 2px; }
  .tooltip-desc { font-size: 12px; line-height: 1.5; color: var(--text-dim); margin-bottom: 14px; padding: 8px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }

  /* responsive: shrink inspect on mobile */
  @media (max-width: 540px) {
    .inspect-modal { padding: 14px; }
    .inspect-head { grid-template-columns: 72px 1fr; gap: 10px; }
    .inspect-portrait { width: 72px; height: 72px; }
    .inspect-name { font-size: 15px; }
    .inspect-stats { grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 4px; }
    .inspect-stat { padding: 6px 3px; }
    .inspect-stat-value { font-size: 14px; }
  }

  .type-fire  { color: var(--fire); }
  .type-water { color: var(--water); }
  .type-grass { color: var(--grass); }
  .type-light { color: var(--light); }
  .type-dark  { color: var(--dark); }
  .type-pip {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 4px;
    vertical-align: middle;
  }
  .type-pip.fire  { background: var(--fire); }
  .type-pip.water { background: var(--water); }
  .type-pip.grass { background: var(--grass); }
  .type-pip.light { background: var(--light); }
  .type-pip.dark  { background: var(--dark); }

  /* battle */
  .stage {
    position: relative; height: 220px; background: linear-gradient(180deg, #1a1a26 0%, #14141c 60%, #0a0a10 100%);
    border: 1px solid var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 12px;
  }
  .stage-actor { position: absolute; bottom: 24px; transition: transform 0.18s; }
  .stage-actor svg { width: 140px; height: 140px; }
  .stage-actor.player { left: 30px; transform-origin: bottom center; }
  .stage-actor.enemy  { right: 30px; transform-origin: bottom center; }
  /* Tiny bench creature shadows behind/beside the active. Smaller, dimmer. */
  .stage-bench { position: absolute; bottom: 40px; opacity: 0.45; filter: grayscale(0.4); pointer-events: none; }
  .stage-bench svg { width: 70px; height: 70px; }
  .stage-bench.player { left: 0px; }
  .stage-bench.enemy  { right: 0px; }
  .stage-actor.player.lunge { animation: lunge-r 0.34s ease-out; }
  .stage-actor.enemy.lunge  { animation: lunge-l 0.34s ease-out; }
  .stage-actor.recoil { animation: recoil 0.32s ease-out; }
  @keyframes lunge-r { 0%{transform:translateX(0)} 50%{transform:translateX(40px)} 100%{transform:translateX(0)} }
  @keyframes lunge-l { 0%{transform:translateX(0)} 50%{transform:translateX(-40px)} 100%{transform:translateX(0)} }
  @keyframes recoil { 0%{transform:translateX(0)} 30%{transform:translateX(var(--rx, 12px))} 100%{transform:translateX(0)} }
  .stage-actor.idle { animation: bob 2.6s ease-in-out infinite; }
  @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
  .stage.shake { animation: shake 0.36s; }
  @keyframes shake {
    0%,100% { transform: translate(0, 0); }
    20% { transform: translate(-3px, 1px); }
    40% { transform: translate(3px, -1px); }
    60% { transform: translate(-2px, 2px); }
    80% { transform: translate(2px, -2px); }
  }
  .floating { position: absolute; font-weight: bold; font-size: 26px; pointer-events: none; animation: float-up 0.95s forwards; text-shadow: 0 2px 4px rgba(0,0,0,0.8); z-index: 5; }
  .floating.crit { font-size: 32px; color: #ffcc55; }
  .floating.heal { color: #66ee99; }
  @keyframes float-up { 0%{transform:translateY(0); opacity:1} 100%{transform:translateY(-58px); opacity:0} }
  .callout {
    position: absolute; left: 50%; top: 30%; transform: translate(-50%, 0);
    font-weight: 900; font-size: 18px; color: #fff; letter-spacing: 4px;
    pointer-events: none; animation: callout 0.9s forwards;
    text-shadow: 0 0 6px var(--accent), 0 2px 4px #000;
    z-index: 6;
  }
  @keyframes callout { 0%{opacity:0; transform:translate(-50%,10px) scale(0.7)} 30%{opacity:1; transform:translate(-50%,0) scale(1.1)} 80%{opacity:1; transform:translate(-50%,0) scale(1)} 100%{opacity:0; transform:translate(-50%,-12px) scale(1)} }

  /* battle hud */
  .battle-hud { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .bench-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 10px;
  }
  .bench-slot {
    background: rgba(13, 13, 20, 0.5); border: 1px dashed var(--border); border-radius: 4px;
    padding: 8px; display: flex; align-items: center; gap: 10px; min-height: 64px;
    opacity: 0.85;
  }
  .bench-slot.enemy { flex-direction: row-reverse; }
  .bench-slot.inspectable { cursor: pointer; }
  .bench-portrait { width: 48px; height: 48px; flex-shrink: 0; }
  .bench-portrait svg { width: 100%; height: 100%; }
  .bench-empty { color: var(--text-faint); font-size: 11px; flex: 1; text-align: center; }
  .bench-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
  .bench-name-row { display: flex; align-items: center; gap: 6px; font-size: 11px; }
  .bench-name { color: var(--text); font-weight: bold; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bench-level { color: var(--accent); font-size: 10px; }
  .bench-hp-text { font-size: 10px; color: var(--text-dim); letter-spacing: 0.5px; }
  .bench-hp { width: 100%; height: 5px; background: #050508; border: 1px solid var(--border); border-radius: 2px; overflow: hidden; }
  .bench-hp-fill { height: 100%; transition: width 0.3s; }
  .bench-status { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 1px; }
  .bench-status .status-chip { font-size: 8px; padding: 1px 4px; }
  .swap-btn {
    width: 100%; margin-top: 10px; padding: 12px;
    background: linear-gradient(180deg, #2a2a3a 0%, #1a1a25 100%);
    border: 2px solid var(--border); border-radius: 6px;
    color: var(--text); font-weight: bold; font-size: 14px; letter-spacing: 1px;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    cursor: pointer; transition: all 0.12s;
  }
  .swap-btn:not(.disabled):hover {
    border-color: var(--accent); transform: translateY(-2px);
  }
  .swap-btn.disabled { opacity: 0.45; cursor: not-allowed; }
  .swap-btn .swap-icon { font-size: 18px; color: var(--accent); }
  .actor-hud {
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 4px;
    padding: 10px;
  }
  .actor-hud-name { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; font-weight: bold; font-size: 13px; }
  .hp-line { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
  .hp-bar { height: 10px; background: var(--hp-bg); border-radius: 2px; overflow: hidden; margin-top: 3px; border: 1px solid #2a1818; }
  .hp-fill { height: 100%; background: linear-gradient(90deg, #c84a4a, #e86a6a); transition: width 0.42s ease-out; }
  .hp-fill.low { background: linear-gradient(90deg, #c84a4a, #ee9933); }
  .hp-fill.critical { background: linear-gradient(90deg, #ee5544, #ff8855); animation: pulse-red 0.9s infinite; }
  @keyframes pulse-red { 0%,100%{opacity:1} 50%{opacity:0.65} }
  .status-row { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
  .status-chip { font-size: 9px; letter-spacing: 1px; padding: 2px 6px; border-radius: 2px; border: 1px solid; }
  .status-chip.heal { color: #66ee99; border-color: #66ee99; }
  .status-chip.burn { color: #ff9966; border-color: #ff9966; }
  .status-chip.slow { color: #99ccff; border-color: #99ccff; }
  .status-chip.buff { color: #ffcc66; border-color: #ffcc66; }
  .status-chip.debuff { color: #ee7777; border-color: #ee7777; }
  .stat-mod { font-size: 10px; color: var(--text-dim); margin-top: 4px; }

  /* abilities */
  .ability-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .ability-grid.pokemon { grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 4px; }
  .ability-btn {
    text-align: left; padding: 10px 12px; line-height: 1.3; min-height: 60px;
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 3px;
    position: relative;
  }
  .ability-btn.compact { min-height: 48px; padding: 12px 14px; display: flex; align-items: center; }
  .ability-btn.pokemon-btn {
    min-height: 76px;
    padding: 14px 16px;
    display: flex; align-items: center; justify-content: flex-start;
    background: linear-gradient(180deg, #1f1f2a 0%, #16161e 100%);
    border: 2px solid var(--border);
    border-radius: 6px;
    font-size: 16px;
    transition: all 0.12s;
  }
  .ability-btn.pokemon-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: linear-gradient(180deg, #2a2a38 0%, #1f1f2a 100%);
    transform: translateY(-2px);
  }
  .ability-btn.pokemon-btn:active:not(:disabled) {
    transform: translateY(0);
  }
  .ability-btn.pokemon-btn.elem-fire  { border-color: rgba(255, 119, 85, 0.5); }
  .ability-btn.pokemon-btn.elem-water { border-color: rgba(85, 153, 255, 0.5); }
  .ability-btn.pokemon-btn.elem-grass { border-color: rgba(102, 204, 119, 0.5); }
  .ability-btn.pokemon-btn.elem-light { border-color: rgba(255, 229, 168, 0.5); }
  .ability-btn.pokemon-btn.elem-dark  { border-color: rgba(170, 119, 204, 0.5); }
  .ability-btn .name { font-weight: bold; font-size: 13px; }
  .ability-btn.compact .name { font-size: 14px; }
  .ability-btn.pokemon-btn .name { font-size: 16px; letter-spacing: 0.5px; }
  .ability-btn.pokemon-btn .dmg-value {
    font-size: 22px; font-weight: bold; color: var(--accent); letter-spacing: 0;
    margin-top: 2px; line-height: 1.0;
  }
  .ability-btn.pokemon-btn .dmg-value.subtle {
    font-size: 12px; color: var(--text-faint); letter-spacing: 1.5px; font-weight: bold;
  }
  .ability-btn.pokemon-btn .dmg-value.subtle.heal { color: #66cc99; }
  .ability-btn.pokemon-btn { flex-direction: column; align-items: flex-start; justify-content: center; }
  .ability-btn .desc { font-size: 10px; color: var(--text-dim); margin-top: 3px; }
  .ability-btn .eff-tag { position: absolute; top: 8px; right: 10px; font-size: 9px; letter-spacing: 1px; }
  .ability-btn.compact .eff-tag { top: 50%; transform: translateY(-50%); right: 12px; font-size: 11px; font-weight: bold; }
  .ability-btn.pokemon-btn .eff-tag { top: 8px; right: 10px; font-size: 12px; font-weight: bold; transform: none; }
  /* Super-effective marker is a star icon in the corner — no green glow which clashes with grass type. */
  .ability-btn .eff-star {
    position: absolute; top: 6px; right: 8px; font-size: 18px; color: #ffd966;
    text-shadow: 0 0 4px rgba(255, 217, 102, 0.8);
    pointer-events: none;
  }

  /* log */
  .battle-log {
    background: #0a0a12; border: 1px solid var(--border); border-radius: 3px;
    padding: 10px; max-height: 90px; overflow-y: auto; margin-bottom: 12px;
    font-size: 11px; line-height: 1.55;
  }
  .battle-log .log-line { color: var(--text-dim); }
  .battle-log .log-line.crit { color: #ffcc55; }
  .battle-log .log-line.eff { color: var(--accent); }

  /* roster */
  .roster-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .reserve-slot {
    background: #0d0d14; border: 1px dashed var(--border); border-radius: 3px;
    padding: 8px; display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text-dim);
  }
  .reserve-slot .reserve-portrait { width: 36px; height: 36px; background: #050508; border-radius: 3px; }
  .reserve-slot .reserve-portrait svg { width: 100%; height: 100%; }

  /* mobile-friendly tweaks for narrow viewports */
  @media (max-width: 540px) {

const TYPES = ['fire', 'water', 'grass', 'light', 'dark'];
const TYPE_CHART = {
  // Triangle pairs deal 1.25x damage (super-effective). No resistances — only effective or neutral.
  // Type advantage is intentionally a small nudge so status mechanics (burn/bloom/soaking/etc)
  // remain meaningful — a super-effective hit shouldn't end the fight before statuses can play out.
  // Fire > Grass > Water > Fire (cycle); Light > Dark > Light (pair).
  fire:  { fire: 1, water: 1, grass: 1.25, light: 1, dark: 1 },
  water: { fire: 1.25, water: 1, grass: 1, light: 1, dark: 1 },
  grass: { fire: 1, water: 1.25, grass: 1, light: 1, dark: 1 },
  light: { fire: 1, water: 1, grass: 1, light: 1, dark: 1.25 },
  dark:  { fire: 1, water: 1, grass: 1, light: 1.25, dark: 1 },
};

const TYPE_PALETTE = {

  water: { primary: '#3a78d4', secondary: '#66aaee', accent: '#aaddff', dark: '#1a3a7a' },

  dark:  { primary: '#7a4a9a', secondary: '#aa77cc', accent: '#ddaaff', dark: '#3a1a5a' },
};

function blendPalettes(a, b) {
  const blend = (h1, h2) => {
    const p = (h) => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
    const [r1,g1,b1] = p(h1), [r2,g2,b2] = p(h2);
    const mix = (a,b) => Math.round((a+b)/2).toString(16).padStart(2,'0');
    return '#' + mix(r1,r2) + mix(g1,g2) + mix(b1,b2);
  };
  return {
    primary: blend(a.primary, b.primary),
    secondary: blend(a.secondary, b.secondary),
    accent: blend(a.accent, b.accent),
    dark: blend(a.dark, b.dark),
  };
}

// ============================================================
// CREATURES — 31 species, redesigned with extreme variance.
//
// Design goal: every template has a CLEAR identity. No two creatures should
// occupy the same archetype. Stats, growths, AND passives are tuned together
// to express that identity. Growths are pushed toward extremes (F or S) where

//   STARTER         — balanced, defines its type

//   SHATTERED       — poor base AND poor growths, but extreme passive carries
//   MONOMANIAC      — one S stat, the rest are F
//   ALL_ROUNDER     — pure C/B everywhere, boring but flexible
//   BERSERKER       — high atk + can't heal
//   STONE_AGE       — high stats but F growths (peaks early)
//   SUSTAIN         — average stats, sustain passive (heals/lifesteal)

// ============================================================
// CREATURE FACTORY
// ============================================================

let creatureIdCounter = 1;

function renderCreatureSvg(creature) {
  const gen = ART_GENERATORS[creature.species];
  if (!gen) return '<svg viewBox="0 0 120 100"><circle cx="60" cy="60" r="20" fill="#666"/></svg>';
  return gen(creature.palette);
}

function rand(min, max) { return Math.random() * (max - min) + min; }
function randi(min, max) { return Math.floor(rand(min, max + 1)); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function pickN(arr, n) {
  const copy = [...arr];
  const out = [];
  while (out.length < n && copy.length) out.push(copy.splice(Math.floor(Math.random() * copy.length), 1)[0]);
  return out;
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function makeCreature(template, level = 1, options = {}) {
  // Build stats from base, then apply per-level growth.
  // HP gets 4x scaling because HP numbers are ~5x other stats; without scaling, S-rank HP growth
  // would only add ~3 HP/level, which feels worthless. With 4x: S HP growth = ~10 HP/level.
  const stats = { ...template.baseStats };
  for (let l = 2; l <= level; l++) {
    stats.hp  += Math.max(1, Math.round(template.growth.hp  * 4 + rand(-0.5, 1)));
    stats.atk += Math.max(0, Math.round(template.growth.atk * 2 + rand(-0.5, 1)));
    stats.def += Math.max(0, Math.round(template.growth.def * 2 + rand(-0.5, 1)));
    stats.spd += Math.max(0, Math.round(template.growth.spd * 2 + rand(-0.5, 1)));
  }
  stats.hp  = Math.max(8, stats.hp);
  stats.atk = Math.max(2, stats.atk);
  stats.def = Math.max(1, stats.def);
  stats.spd = Math.max(1, stats.spd);

  const abilities = options.abilities || pickN(template.abilityPool, 4);
  // Passives: every species has TWO unique passives (primary 70%, secondary 30%). The
  // creature rolls one of the two on creation — never both. This is similar to the move-pool
  // model: the species has a fixed pair, and each spawn instance picks one. Build crafting
  // gets a hidden axis since the rare-passive variant might be more exotic or specialized.
  let passives;
  if (options.passives) {
    passives = options.passives;
  } else {
    const rolledPassive = Math.random() < 0.30
      ? template.secondaryPassive
      : template.primaryPassive;
    passives = [rolledPassive];
  }
  const palette = options.palette || TYPE_PALETTE[template.type];
  // Growth used for level-ups can be overridden (via breeding).
  const growth = options.growth || template.growth;
  return {
    id: creatureIdCounter++,
    species: template.species,
    type: options.type || template.type,
    growth,
    level,
    xp: 0,
    stats,
    maxHp: stats.hp,
    abilities,
    passives,
    palette,
    customName: options.customName || null,
  };
}

// XP curve scales for level cap of 50. Total XP from L1 to L50 ≈ 30,500.
// At a typical per-fight gain of ~120-300 XP (based on enemy level), this means a starting creature
// can reach L50 across ~3 runs of consistent fighting. Tuned for the "uber monster" arc.
function xpToNext(level) { return level * 25; }

function gainXp(creature, amount) {
  const events = [];
  if (creature.level >= MAX_LEVEL) return events;
  creature.xp += amount;
  while (creature.xp >= xpToNext(creature.level) && creature.level < MAX_LEVEL) {
    creature.xp -= xpToNext(creature.level);
    creature.level++;
    const dHp  = Math.max(1, Math.round(creature.growth.hp  * 4 + rand(-0.5, 1.5)));
    const dAtk = Math.max(0, Math.round(creature.growth.atk * 2 + rand(-0.5, 1.5)));
    const dDef = Math.max(0, Math.round(creature.growth.def * 2 + rand(-0.5, 1.5)));
    const dSpd = Math.max(0, Math.round(creature.growth.spd * 2 + rand(-0.5, 1.5)));
    creature.stats.hp += dHp;
    creature.stats.atk += dAtk;
    creature.stats.def += dDef;
    creature.stats.spd += dSpd;
    creature.maxHp = creature.stats.hp;
    events.push({ level: creature.level, deltas: { hp: dHp, atk: dAtk, def: dDef, spd: dSpd } });
  }
  if (creature.level >= MAX_LEVEL) creature.xp = 0;
  return events;
}

// Growth rank helper. Ranks are color-coded F→S where F is bottom-tier and S is exceptional.
// Same threshold across all stats so a "B HP" and a "B ATK" mean the same growth quality.
function growthRank(g) {
  if (g >= 2.6) return 'S';
  if (g >= 2.2) return 'A';
  if (g >= 1.8) return 'B';
  if (g >= 1.4) return 'C';
  if (g >= 1.0) return 'D';
  if (g >= 0.6) return 'E';
  return 'F';
}
// Color for rank. Red (bad) → green (good) gradient, with gold as the S capstone.
function rankColor(r) {
  return ({
    'S': '#ffcc44',  // gold capstone
    'A': '#66cc66',  // green
    'B': '#88cc55',  // green-yellow
    'C': '#cccc55',  // yellow
    'D': '#cc9955',  // orange
    'E': '#cc7755',  // red-orange
    'F': '#cc5555',  // red
  })[r] || '#888';
}

function displayName(c) {
  return c.customName || `${c.species} L${c.level}`;
}

// ============================================================
// AUDIO
// ============================================================

let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { audioCtx = null; }
  }
  return audioCtx;
}
function sfx(type) {
  const ctx = ensureAudio();
  if (!ctx) return;
  const t = ctx.currentTime;
  const tone = (freq, dur, kind = 'sine', vol = 0.15) => {
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.type = kind; o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g); g.connect(ctx.destination);
    o.start(t); o.stop(t + dur);
  };
  const slide = (f1, f2, dur, kind = 'sine', vol = 0.15) => {
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.type = kind;
    o.frequency.setValueAtTime(f1, t); o.frequency.exponentialRampToValueAtTime(f2, t + dur);
    g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g); g.connect(ctx.destination);
    o.start(t); o.stop(t + dur);
  };
  switch (type) {
    case 'hit':     tone(220, 0.12, 'square', 0.2); break;
    case 'crit':    slide(440, 110, 0.22, 'sawtooth', 0.25); break;
    case 'heal':    slide(440, 880, 0.32, 'sine', 0.18); break;
    case 'select':  tone(660, 0.06, 'sine', 0.08); break;
    case 'faint':   slide(220, 60, 0.5, 'triangle', 0.18); break;
    case 'victory': slide(440, 880, 0.18, 'sine', 0.18); setTimeout(()=>slide(660, 1100, 0.22, 'sine', 0.15), 180); break;
    case 'capture': slide(330, 770, 0.22, 'triangle', 0.16); break;
    case 'levelup': slide(660, 990, 0.18, 'sine', 0.12); setTimeout(()=>slide(880, 1320, 0.18, 'sine', 0.12), 160); break;
  }
}

// ============================================================
// COMBAT
// ============================================================

function freshFighter(c) {
  return {
    creature: c,
    hp: c.maxHp,
    // statMods are multiplicative deltas. 0 = no change. +0.3 = +30%. -0.33 = -33%.
    statMods: { atk: 0, def: 0, spd: 0 },
    bracingThisTurn: false,
    healing: null,
    aquaveilUsed: false,
    dpApplied: false,
    statuses: {
      burn: null,
      bloom: null,
      soaking: null,  // { turns } — 4-turn -50% ATK debuff
      cursed: null,
      dazed: null,
    },
    // Bench-applied buff (set when a swap-buff move primes this fighter)
    pendingSwapBuff: null,
    pendingSwapHeal: 0,
  };
}

function hasPassive(f, key) { return f.creature.passives && f.creature.passives.includes(key); }

function effectiveStat(f, stat) {
  // statMods are multiplicative deltas. base * (1 + sum_of_deltas).
  let m = 1 + f.statMods[stat];
  if (stat === 'atk') {
    if (hasPassive(f, 'brutal')) m *= 1.5;
    if (hasPassive(f, 'glass_cannon')) m *= 1.75;
    if (hasPassive(f, 'iron_grip')) m *= 1.3;
    if (hasPassive(f, 'giant_form')) m *= 1.2;
    if (hasPassive(f, 'berserker')) m *= 1.4;
    if (hasPassive(f, 'dark_pact') && f.dpApplied) m *= 1.5;
    if (hasPassive(f, 'lightbearer') && (f.hp / f.creature.maxHp) > 0.8) m *= 1.25;
    if (hasPassive(f, 'mortal_coil') && (f.hp / f.creature.maxHp) < 0.25) m *= 1.5;
    // Soaking: -50% ATK while soaked
    if (f.statuses && f.statuses.soaking) m *= 0.5;
    // Slow Burn stacks
    if (hasPassive(f, 'slow_burn') && f.slowBurnStacks) m *= (1 + 0.10 * Math.min(5, f.slowBurnStacks));
    // Rearguard: +25% atk on bench
    if (hasPassive(f, 'rearguard') && f.onBench) m *= 1.25;
  }
  if (stat === 'def') {
    if (hasPassive(f, 'tide_guard')) m *= 1.5;
    if (hasPassive(f, 'iron_grip')) m *= 1.3;
    if (hasPassive(f, 'glass_cannon')) m *= 0.75;
    if (hasPassive(f, 'lightbearer') && (f.hp / f.creature.maxHp) > 0.8) m *= 1.25;
    if (hasPassive(f, 'rearguard') && f.onBench) m *= 1.25;
  }
  if (stat === 'spd') {
    if (hasPassive(f, 'swift')) m *= 1.5;
    if (hasPassive(f, 'giant_form')) m *= 0.8;
    if (hasPassive(f, 'lightbearer') && (f.hp / f.creature.maxHp) > 0.8) m *= 1.25;
    if (hasPassive(f, 'mortal_coil') && (f.hp / f.creature.maxHp) < 0.25) m *= 1.5;
    if (hasPassive(f, 'rearguard') && f.onBench) m *= 1.25;
  }
  // Cap multiplier between 0.25x (-75%) and 3.0x (+200%). Prevents infinite Focus/Fury stacking
  // from one-shotting opponents, while leaving room for meaningful buff combinations.
  m = Math.max(0.25, Math.min(3.0, m));
  return Math.max(1, Math.round(f.creature.stats[stat] * m));
}

function applyBattleStartPassives(pf, ef) {
  for (const f of [pf, ef]) {
    if (hasPassive(f, 'thick_hide')) {
      const bonus = Math.round(f.creature.maxHp * 0.5);
      f.hp += bonus;
    }
    if (hasPassive(f, 'dark_pact')) {
      const cost = Math.round(f.creature.maxHp * 0.25);
      f.hp = Math.max(1, f.hp - cost);
      f.dpApplied = true;
    }
  }
  // Dreadful: opponent's active loses 15% max HP at battle start.
  if (hasPassive(pf, 'dreadful')) {
    ef.hp = Math.max(1, ef.hp - Math.round(ef.creature.maxHp * 0.15));
  }
  if (hasPassive(ef, 'dreadful')) {
    pf.hp = Math.max(1, pf.hp - Math.round(pf.creature.maxHp * 0.15));
  }
  // Prepared: enter battle with 1 stack of soaking on opponent active.
  if (hasPassive(pf, 'prepared')) {
    applyStatus(ef, 'soaking', {});
  }
  if (hasPassive(ef, 'prepared')) {
    applyStatus(pf, 'soaking', {});
  }
}

// returns {dmg, mult, elem, crit}
function calculateDamage(attacker, defender, ability) {
  const atk = effectiveStat(attacker, 'atk');
  let def = effectiveStat(defender, 'def');
  if (ability.effect === 'pierce') def = Math.round(def * 0.5);
  let power = ability.power;
  const elem = ability.element || null;
  // attacker damage modifiers (power-based; stat-based ones live in effectiveStat)
  if (hasPassive(attacker, 'inferno_heart') && elem === 'fire') power *= 1.5;
  if (hasPassive(attacker, 'tide_blessed') && elem === 'water') power *= 1.5;
  if (hasPassive(attacker, 'verdant_soul') && elem === 'grass') power *= 1.5;
  if (hasPassive(attacker, 'sunforged') && elem === 'light') power *= 1.5;
  if (hasPassive(attacker, 'shadowforged') && elem === 'dark') power *= 1.5;
  if (hasPassive(attacker, 'predators_edge') && (defender.hp / defender.creature.maxHp) < 0.5) power *= 1.5;
  if (hasPassive(attacker, 'cornered') && (attacker.hp / attacker.creature.maxHp) < 0.30) power *= 1.5;
  // execute_scale: damage scales with target's missing HP, up to 1.5x at 0% HP
  if (ability.effect === 'execute_scale') {
    const missing = 1 - (defender.hp / defender.creature.maxHp);
    power *= 1 + 0.5 * missing;
  }
  // cursed_synergy: +50% damage if target already cursed
  if (ability.effect === 'cursed_synergy' && defender.statuses && defender.statuses.cursed) {
    power *= 1.5;
  }
  if (hasPassive(attacker, 'tempo') && effectiveStat(attacker, 'spd') > effectiveStat(defender, 'spd')) power *= 1.25;
  // pristine: first attack of battle is double
  if (hasPassive(attacker, 'pristine') && !attacker.pristineUsed) {
    power *= 2;
    attacker.pristineUsed = true;
  }
  // patient_hunter stacks
  if (hasPassive(attacker, 'patient_hunter') && attacker.patientStacks) {
    power *= (1 + 0.50 * Math.min(3, attacker.patientStacks));
    attacker.patientStacks = 0;
  }
  // status_lord: +30% per unique status on target
  if (hasPassive(attacker, 'status_lord') && defender.statuses) {
    let count = 0;
    if (defender.statuses.burn) count++;
    if (defender.statuses.bloom) count++;
    if (defender.statuses.soaking) count++;
    if (defender.statuses.cursed) count++;
    if (defender.statuses.dazed) count++;
    if (count > 0) power *= (1 + 0.30 * count);
  }
  // zealot: +50% on attack right after a buff
  if (hasPassive(attacker, 'zealot') && attacker.zealotPrimed) {
    power *= 1.5;
    attacker.zealotPrimed = false;
  }
  // type mult — eldritch_sight ignores it
  let mult = 1;
  if (hasPassive(attacker, 'eldritch_sight')) {
    mult = 1; // explicit: no super-effective, no resistance
  } else if (elem) {
    mult = TYPE_CHART[elem][defender.creature.type];
  }
  // misty form: 25% to evade
  if (hasPassive(defender, 'misty_form') && Math.random() < 0.25) {
    return { dmg: 0, mult, elem, crit: false, evaded: true };
  }
  // base damage — attacker-centric formula. atk * (power/50) scaled by atk/(atk+def).
  // Power values are 10-100 (50 = "average"). The /50 normalizes to a multiplier scale.
  // Scalar 0.55: a basic 50-power attack lands ~7-9% of target HP per swing on neutral matchups
  // at low levels, scaling up to ~12-15% at high levels (where attack stats spike from growth).
  // This makes burn (5%/turn × 4 = 20% total) and bloom (5%/turn × 4 = 20% heal) meaningful
  // throughout the level range. Fights last ~10-14 turns on neutral matchups.
  let raw = atk * (power / 50) * (atk / (atk + def)) * 0.55;
  if (raw < 1) raw = 1;
  raw *= mult;
  // brace
  if (defender.bracingThisTurn) raw *= 0.4;
  // stone skin (flat reduction)
  if (hasPassive(defender, 'stone_skin')) raw -= 3;
  // crit
  const crit = Math.random() < 0.1;
  if (crit) {
    // doubling_down: 3x crits while above 50% HP
    let critMult = 1.6;
    if (hasPassive(attacker, 'doubling_down') && (attacker.hp / attacker.creature.maxHp) > 0.5) critMult = 3.0;
    raw *= critMult;
  }
  // randomness
  raw *= rand(0.92, 1.08);
  raw = Math.max(1, Math.round(raw));
  return { dmg: raw, mult, elem, crit };
}

// Deterministic damage estimate for the move-button UI. No crit, no random roll, no evasion.
// Returns the average expected damage of one hit. Multi-hit moves should multiply by hits.
function estimateDamage(attacker, defender, ability) {
  if (!ability.power || ability.power <= 0) return 0;
  if (ability.kind !== 'attack' && ability.kind !== 'charge_attack') return 0;
  const atk = effectiveStat(attacker, 'atk');
  let def = effectiveStat(defender, 'def');
  if (ability.effect === 'pierce') def = Math.round(def * 0.5);
  let power = ability.power;
  const elem = ability.element || null;
  if (hasPassive(attacker, 'inferno_heart') && elem === 'fire') power *= 1.5;
  if (hasPassive(attacker, 'predators_edge') && (defender.hp / defender.creature.maxHp) < 0.5) power *= 1.5;
  if (hasPassive(attacker, 'tempo') && effectiveStat(attacker, 'spd') > effectiveStat(defender, 'spd')) power *= 1.25;
  if (hasPassive(attacker, 'berserker')) power *= 1.4;
  if (hasPassive(attacker, 'slow_burn') && attacker.slowBurnStacks) power *= (1 + 0.10 * Math.min(5, attacker.slowBurnStacks));
  if (hasPassive(attacker, 'mortal_coil') && (attacker.hp / attacker.creature.maxHp) < 0.25) power *= 1.5;
  let mult = 1;
  if (!hasPassive(attacker, 'eldritch_sight') && elem) mult = TYPE_CHART[elem][defender.creature.type];
  let raw = atk * (power / 50) * (atk / (atk + def)) * 0.4;
  if (raw < 1) raw = 1;
  raw *= mult;
  if (hasPassive(defender, 'stone_skin')) raw -= 3;
  raw = Math.max(1, Math.round(raw));
  return raw;
}

// AI decision. Returns an ability key from the active fighter's pool,
// or '_swap' as a sentinel meaning "swap to bench this turn".
// The caller (playerAct) checks the sentinel and dispatches a swap instead of resolveAction.
function aiChoose(ef, pf) {
  const abilities = ef.creature.abilities;
  const hpFrac = ef.hp / ef.creature.maxHp;
  const lowHp = hpFrac < 0.3;
  // Consider swapping. Multiple heuristics stack into a probability.
  if (state.ebf && state.ebf.hp > 0) {
    let swapWeight = 0;
    const benchFrac = state.ebf.hp / state.ebf.creature.maxHp;
    // 1) Active dangerously low + bench much healthier
    if (hpFrac < 0.25 && benchFrac > hpFrac + 0.30) swapWeight += 0.55;
    // 2) Cursed and below half — eat curse on swap > get killed
    if (ef.statuses && ef.statuses.cursed && hpFrac < 0.5 && benchFrac > 0.5) swapWeight += 0.35;
    // 3) Soaked and bench is fresh — swap to recover
    if (ef.statuses && ef.statuses.soaking && benchFrac > 0.6) swapWeight += 0.30;
    // 4) Type matchup: bench has better type advantage vs current player active.
    //    Compute the best type-multiplier of any attack each side can throw at the player.
    const pType = pf.creature.type;
    let activeBest = 1, benchBest = 1;
    for (const k of ef.creature.abilities) {
      const a = ABILITIES[k];
      if (a && a.element) activeBest = Math.max(activeBest, TYPE_CHART[a.element][pType] || 1);
    }
    for (const k of state.ebf.creature.abilities) {
      const a = ABILITIES[k];
      if (a && a.element) benchBest = Math.max(benchBest, TYPE_CHART[a.element][pType] || 1);
    }
    if (benchBest > activeBest && benchFrac > 0.6) swapWeight += 0.25;
    // 5) Player active has a type advantage on us — bench might tank better.
    let playerBest = 1;
    for (const k of pf.creature.abilities) {
      const a = ABILITIES[k];
      if (a && a.element) playerBest = Math.max(playerBest, TYPE_CHART[a.element][ef.creature.type] || 1);
    }
    let playerVsBench = 1;
    for (const k of pf.creature.abilities) {
      const a = ABILITIES[k];
      if (a && a.element) playerVsBench = Math.max(playerVsBench, TYPE_CHART[a.element][state.ebf.creature.type] || 1);
    }
    if (playerBest > playerVsBench && hpFrac < 0.7) swapWeight += 0.20;
    // 6) Occasional unpredictability — small base chance to swap when active isn't optimal.
    if (hpFrac < 0.6 && benchFrac > 0.7 && Math.random() < 0.05) swapWeight += 0.15;
    if (Math.random() < swapWeight) return '_swap';
  }
  // Standard fallbacks: heal when low.
  if (lowHp) {
    if (abilities.includes('mend') && (!ef.healing || ef.healing.turnsLeft <= 1)) return 'mend';
  }
  // Pick best attack by power × type chart
  let best = null, bestScore = -1;
  for (const k of abilities) {
    const a = ABILITIES[k];
    if (a.kind !== 'attack' && a.kind !== 'charge_attack') continue;
    let s = a.power || 1;
    if (a.element) s *= TYPE_CHART[a.element][pf.creature.type] || 1;
    s += Math.random() * 0.3;
    if (s > bestScore) { bestScore = s; best = k; }
  }
  return best || abilities[0];
}

// ============================================================
// WAVE / ENEMY GENERATION
// ============================================================

function partyAvgLevel(roster) {
  if (!roster.length) return 1;
  return Math.round(roster.reduce((a,c)=>a+c.level,0) / roster.length);
}

// Enemy generation now draws from the FULL species pool starting at wave 1. Difficulty comes from
// level (which scales aggressively per wave), not from gating species. This means you might face
// a Pyrelord at wave 1 — and you can capture and use the wide variety of species early.
const ALL_ENCOUNTER_SPECIES = TEMPLATES.filter(t => !t.starter).map(t => t.species);

function generateEnemy(wave, partyLevel) {
  const speciesName = pick(ALL_ENCOUNTER_SPECIES);
  const t = TEMPLATES.find(x => x.species === speciesName) || TEMPLATES[0];
  // Level scaling: enemies grow faster than the party so outscaling is impossible.
  // Wave 1 = partyLevel + 0..2, wave 9 = partyLevel + 16..18, capped at MAX_LEVEL.
  const baseLvl = partyLevel + (wave - 1) * 2 + randi(0, 2);
  const lvl = Math.max(1, Math.min(MAX_LEVEL, baseLvl));
  const c = makeCreature(t, lvl);
  // Enemies are statistically stronger than equivalent player creatures since they have
  // worse AI and only ever roll a primary passive. +15% across HP/ATK/DEF.
  c.stats.hp  = Math.round(c.stats.hp  * 1.15);
  c.stats.atk = Math.round(c.stats.atk * 1.15);
  c.stats.def = Math.round(c.stats.def * 1.15);
  c.maxHp = c.stats.hp;
  return c;
}

function generateEnemyParty(wave, partyLevel) {
  const a = generateEnemy(wave, partyLevel);
  let b;
  let tries = 0;
  do {
    b = generateEnemy(wave, partyLevel);
    tries++;
  } while (b.species === a.species && tries < 10);
  return [a, b];
}

function generateBoss(partyLevel) {
  // Bosses pull from the full pool, are 3 levels above party, have Apex buff.
  const speciesName = pick(ALL_ENCOUNTER_SPECIES);
  const t = TEMPLATES.find(x => x.species === speciesName) || TEMPLATES[0];
  const lvl = Math.max(8, Math.min(MAX_LEVEL, partyLevel + 5));
  const c = makeCreature(t, lvl);
  // Apex stat boost: +30% HP, +20% ATK, +15% DEF on top of the standard +15% enemy boost
  c.stats.hp  = Math.round(c.stats.hp  * 1.5);
  c.stats.atk = Math.round(c.stats.atk * 1.4);
  c.stats.def = Math.round(c.stats.def * 1.3);
  c.maxHp = c.stats.hp;
  c.customName = `Apex ${c.species}`;
  return c;
}

// Boss wave: TWO Apex creatures (no minion). Both are big.
function generateBossParty(partyLevel) {
  const boss1 = generateBoss(partyLevel);
  let boss2;
  let tries = 0;
  do {
    boss2 = generateBoss(partyLevel);
    tries++;
  } while (boss2.species === boss1.species && tries < 10);
  return [boss1, boss2];
}

// STATE
// ============================================================

const TOTAL_WAVES = 10;
const BREED_WAVES = new Set([3, 6, 9]);
const MAX_LEVEL = 50;

const state = {
  screen: 'start',  // start, starter_pick, bloodline_ready, prebattle, battle, aftermath, breed, victory, gameover
  wave: 0,
  party: [],
  reserve: [],
  activeIdx: 0,
  enemy: null,             // active enemy creature (mirrors enemyParty[enemyActiveIdx])
  enemyParty: [],          // 2 enemies per wave
  enemyActiveIdx: 0,
  pf: null,                // active player fighter
  bf: null,                // benched player fighter (statuses tick on bench)
  ef: null,                // active enemy fighter
  ebf: null,               // benched enemy fighter
  log: [],
  breedState: null,
  postBattleEvents: null,
  acting: false,
  pCharge: null,
  eCharge: null,
};

// ============================================================
// RENDER HELPERS
// ============================================================

const app = () => document.getElementById('app');

// Long-press helper. Holding pointer for 450ms triggers `onLongPress` and suppresses the subsequent click.
// Tap (release before threshold) calls `onTap` if provided. If the user moves more than 12px, treat as scroll, cancel.
//
// IMPORTANT mobile detail: when a touchend fires, the browser synthesizes a mousedown→mouseup→click ~300ms later.
// Without guarding, the same tap fires onTap twice (once via touchend, once via the synthesized chain) which
// can cause "tap selects then immediately deselects" ghost-flicker bugs in selectable lists.
// We guard with a per-element timestamp and ignore mouse events that fall within ~400ms of a touch.
const LONG_PRESS_MS = 450;
const LONG_PRESS_MOVE_TOLERANCE = 12;
const POST_TOUCH_GUARD_MS = 500;
function attachLongPress(elem, onLongPress, onTap) {
  let timer = null;
  let suppressed = false;
  let startX = 0, startY = 0;
  let lastTouchEndAt = 0;

  const start = (e, isTouch) => {
    // Ignore synthetic mouse events that follow a real touch.
    if (!isTouch && (Date.now() - lastTouchEndAt) < POST_TOUCH_GUARD_MS) return;
    suppressed = false;
    const t = e.touches ? e.touches[0] : e;
    startX = t.clientX; startY = t.clientY;
    clearTimeout(timer);
    timer = setTimeout(() => {
      timer = null;
      suppressed = true;
      try { onLongPress(e); } catch (err) { console.error(err); }
    }, LONG_PRESS_MS);
  };
  const move = (e) => {
    if (!timer) return;
    const t = e.touches ? e.touches[0] : e;
    if (Math.abs(t.clientX - startX) > LONG_PRESS_MOVE_TOLERANCE ||
        Math.abs(t.clientY - startY) > LONG_PRESS_MOVE_TOLERANCE) {
      clearTimeout(timer); timer = null;
    }
  };
  const end = (e, isTouch) => {
    // Ignore synthetic mouseup that follows a real touch.
    if (!isTouch && (Date.now() - lastTouchEndAt) < POST_TOUCH_GUARD_MS) return;
    if (timer) {
      clearTimeout(timer); timer = null;
      if (onTap && !suppressed) onTap(e);
    }
    if (isTouch) lastTouchEndAt = Date.now();
  };
  const cancel = () => { clearTimeout(timer); timer = null; };
  elem.addEventListener('mousedown', (e) => start(e, false));
  elem.addEventListener('mousemove', move);
  elem.addEventListener('mouseup', (e) => end(e, false));
  elem.addEventListener('mouseleave', cancel);
  elem.addEventListener('touchstart', (e) => start(e, true), { passive: true });
  elem.addEventListener('touchmove', move, { passive: true });
  elem.addEventListener('touchend', (e) => {
    // preventDefault here suppresses the synthesized click event the browser would fire,
    // which would otherwise re-trigger our handler via the synthetic mousedown/mouseup chain.
    if (e.cancelable) e.preventDefault();
    end(e, true);
  });
  elem.addEventListener('touchcancel', cancel);
  // Suppress the click event that the browser synthesizes after touchend.
  elem.addEventListener('click', (e) => {
    if ((Date.now() - lastTouchEndAt) < POST_TOUCH_GUARD_MS) {
      e.preventDefault(); e.stopPropagation();
    }
  });
  // Block context menu on long-press
  elem.addEventListener('contextmenu', (e) => { if (suppressed) e.preventDefault(); });
}

function el(tag, props = {}, children = []) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(props)) {
    if (k === 'class') e.className = v;
    else if (k === 'onclick') { if (v) e.addEventListener('click', v); }
    else if (k === 'style') e.setAttribute('style', v);
    else if (k === 'html') e.innerHTML = v;
    else e.setAttribute(k, v);
  }
  if (!Array.isArray(children)) children = [children];
  for (const c of children) {
    if (c == null || c === false) continue;
    if (typeof c === 'string' || typeof c === 'number') e.appendChild(document.createTextNode(String(c)));
    else e.appendChild(c);
  }
  return e;
}

// Attach long-press behavior to an element using the existing 3-arg attachLongPress(elem, onLongPress, onTap).
// (Helper showTooltip/hideTooltip below; the long-press itself is defined above.)

// Simple floating tooltip near a target element
let _activeTooltip = null;
function showTooltip(target, contentEl) {
  hideTooltip();
  const t = el('div', { class: 'lp-tooltip' });
  t.appendChild(contentEl);
  document.body.appendChild(t);
  // position above target, clamped to viewport
  const r = target.getBoundingClientRect();
  const tw = t.offsetWidth || 200;
  const th = t.offsetHeight || 80;
  let left = r.left + r.width / 2 - tw / 2;
  let top = r.top - th - 8;
  if (top < 8) top = r.bottom + 8;  // flip below if above viewport
  left = Math.max(8, Math.min(window.innerWidth - tw - 8, left));
  t.style.left = left + 'px';
  t.style.top = top + 'px';
  _activeTooltip = t;
  // dismiss on next tap anywhere
  setTimeout(() => {
    const dismiss = () => { hideTooltip(); document.removeEventListener('pointerdown', dismiss); };
    document.addEventListener('pointerdown', dismiss, { once: true });
  }, 0);
}
function hideTooltip() {
  if (_activeTooltip) { _activeTooltip.remove(); _activeTooltip = null; }
}

function portraitEl(creature, sizePx) {
  const wrap = el('div', { class: 'creature-portrait', style: sizePx ? `width:${sizePx}px;height:${sizePx}px;` : '' });
  wrap.innerHTML = renderCreatureSvg(creature);
  return wrap;
}

function creatureCardEl(c, options = {}) {
  const isSelectable = !!options.selectable;
  const card = el('div', { class: 'creature-card' + (isSelectable ? ' selectable' : '') + (options.selected ? ' selected' : '') + (options.dimmed ? ' dimmed' : '') });
  // Long-press anywhere on a card opens the inspect modal.
  // Tap (when selectable) triggers options.onclick.
  if (!options.noInspect) {
    card.classList.add('inspectable');
    attachLongPress(card,
      () => openInspectModal(c),
      isSelectable && options.onclick ? options.onclick : null
    );
  } else if (isSelectable && options.onclick) {
    card.addEventListener('click', options.onclick);
  }
  card.appendChild(portraitEl(c));
  const info = el('div', { class: 'creature-info' });
  const header = el('div', { class: 'creature-header' });
  header.appendChild(el('div', { class: 'creature-name' }, displayName(c)));
  const meta = el('div', { class: 'creature-meta' }, [
    el('span', { class: 'type-pip ' + c.type }),
    el('span', { class: 'type-' + c.type }, c.type.toUpperCase()),
  ]);
  header.appendChild(meta);
  info.appendChild(header);

  const statRow = el('div', { class: 'stat-row' + (options.showGrowths ? ' with-growths' : '') });
  for (const [label, val, growth] of [['HP', c.stats.hp, c.growth.hp], ['ATK', c.stats.atk, c.growth.atk], ['DEF', c.stats.def, c.growth.def], ['SPD', c.stats.spd, c.growth.spd]]) {
    const s = el('div', { class: 'stat' });
    s.appendChild(el('div', { class: 'stat-label' }, label));
    s.appendChild(el('div', { class: 'stat-value' }, String(val)));
    if (options.showGrowths) {
      const r = growthRank(growth);
      s.appendChild(el('div', { class: 'stat-growth rank-' + r, style: `color:${rankColor(r)};border-color:${rankColor(r)};` }, r));
    }
    statRow.appendChild(s);
  }
  info.appendChild(statRow);

  // level + xp
  const lvlLine = el('div', { class: 'level-line' }, `LVL ${c.level} · XP ${c.xp}/${xpToNext(c.level)}`);
  info.appendChild(lvlLine);
  const xpBar = el('div', { class: 'xp-bar' });
  xpBar.appendChild(el('div', { class: 'xp-fill', style: `width:${Math.min(100, c.xp / xpToNext(c.level) * 100)}%;` }));
  info.appendChild(xpBar);

  // passives
  if (c.passives && c.passives.length) {
    const pline = el('div', { class: 'passive-line' });
    const parts = c.passives.map((k, i) => {
      const p = PASSIVES[k];
      return p ? (i > 0 ? '◇ ' : '◆ ') + p.name : k;
    });
    pline.appendChild(el('span', {}, parts.join('   ')));
    info.appendChild(pline);
  }

  card.appendChild(info);
  return card;
}

// INSPECT MODAL — full creature info on tap
