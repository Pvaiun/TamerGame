function openInspectModal(c) {
  const root = document.getElementById('modal-root');
  root.innerHTML = '';
  const bg = el('div', { class: 'modal-bg', onclick: (e) => { if (e.target === bg) root.innerHTML = ''; } });
  const m = el('div', { class: 'modal inspect-modal' });

  // header with portrait + name
  const head = el('div', { class: 'inspect-head' });
  const port = el('div', { class: 'inspect-portrait' });
  port.innerHTML = renderCreatureSvg(c);
  head.appendChild(port);
  const headInfo = el('div', { class: 'inspect-headinfo' });
  headInfo.appendChild(el('div', { class: 'inspect-name' }, displayName(c)));
  headInfo.appendChild(el('div', { class: 'inspect-subhead' }, [
    el('span', { class: 'type-pip ' + c.type }),
    el('span', { class: 'type-' + c.type }, c.type.toUpperCase()),
    el('span', { style: 'color: var(--text-faint); margin: 0 8px;' }, '·'),
    el('span', {}, `${c.species}`),
    el('span', { style: 'color: var(--text-faint); margin: 0 8px;' }, '·'),
    el('span', {}, `LVL ${c.level}`),
  ]));
  head.appendChild(headInfo);
  m.appendChild(head);

  // stats grid
  const sg = el('div', { class: 'inspect-stats' });
  for (const [label, val, growth] of [['HP', c.stats.hp, c.growth.hp], ['ATK', c.stats.atk, c.growth.atk], ['DEF', c.stats.def, c.growth.def], ['SPD', c.stats.spd, c.growth.spd]]) {
    const rank = growthRank(growth);
    const cell = el('div', { class: 'inspect-stat' });
    cell.appendChild(el('div', { class: 'inspect-stat-label' }, label));
    cell.appendChild(el('div', { class: 'inspect-stat-value' }, String(val)));
    const rankWrap = el('div', { class: 'inspect-rank-wrap' });
    rankWrap.appendChild(el('span', { class: 'inspect-rank-label' }, 'GROWTH'));
    rankWrap.appendChild(el('span', { class: 'inspect-rank-tag rank-' + rank, style: `color:${rankColor(rank)};border-color:${rankColor(rank)};` }, rank));
    cell.appendChild(rankWrap);
    sg.appendChild(cell);
  }
  m.appendChild(sg);

  // passives section
  m.appendChild(el('div', { class: 'inspect-section-title' }, 'PASSIVES'));
  if (c.passives && c.passives.length) {
    for (const k of c.passives) {
      const p = PASSIVES[k];
      const row = el('div', { class: 'inspect-row' });
      row.appendChild(el('div', { class: 'inspect-row-name' }, p ? '◆ ' + p.name : k));
      row.appendChild(el('div', { class: 'inspect-row-desc' }, p ? p.desc : '(unknown)'));
      m.appendChild(row);
    }
  } else {
    m.appendChild(el('div', { class: 'inspect-row-desc', style: 'padding: 0 0 8px;' }, '(none)'));
  }

  // abilities section
  m.appendChild(el('div', { class: 'inspect-section-title' }, 'ABILITIES'));
  for (const k of c.abilities) {
    const a = ABILITIES[k];
    const row = el('div', { class: 'inspect-row' });
    const nameRow = el('div', { class: 'inspect-row-name' });
    if (a && a.element) nameRow.appendChild(el('span', { class: 'type-pip ' + a.element }));
    nameRow.appendChild(el('span', {}, a ? a.name : k));
    if (a && a.power && a.power > 0) {
      const hits = a.hits || 1;
      const pwTag = hits > 1 ? `pw ${a.power}×${hits}` : `pw ${a.power}`;
      nameRow.appendChild(el('span', { class: 'inspect-tag' }, pwTag));
    }
    if (a && a.priority) {
      const pTag = a.priority > 0 ? `+${a.priority} prio` : `${a.priority} prio`;
      nameRow.appendChild(el('span', { class: 'inspect-tag' }, pTag));
    }
    row.appendChild(nameRow);
    row.appendChild(el('div', { class: 'inspect-row-desc' }, a ? a.desc : '(unknown)'));
    m.appendChild(row);
  }

  // close button
  const closeRow = el('div', { class: 'modal-actions' });
  closeRow.appendChild(el('button', { class: 'primary', onclick: () => { root.innerHTML = ''; } }, 'Close'));
  m.appendChild(closeRow);

  bg.appendChild(m);
  root.appendChild(bg);
}

// Lightweight tooltip modal for abilities — shows base power, priority, element, full description.
function openAbilityTooltip(abilityKey) {
  const a = ABILITIES[abilityKey];
  if (!a) return;
  const root = document.getElementById('modal-root');
  root.innerHTML = '';
  const bg = el('div', { class: 'modal-bg', onclick: (e) => { if (e.target === bg) root.innerHTML = ''; } });
  const m = el('div', { class: 'modal ability-tooltip-modal' });
  // header
  m.appendChild(el('div', { class: 'tooltip-name' }, [
    a.element ? el('span', { class: 'type-pip ' + a.element, style: 'width:9px;height:9px;margin-right:8px;' }) : null,
    a.name,
  ].filter(Boolean)));
  // metadata grid
  const meta = el('div', { class: 'tooltip-meta' });
  if (a.element) meta.appendChild(metaCell('ELEMENT', a.element.toUpperCase(), 'type-' + a.element));
  meta.appendChild(metaCell('KIND', (a.kind || 'attack').toUpperCase()));
  if (a.power !== undefined) meta.appendChild(metaCell('BASE POWER', String(a.power)));
  if (a.priority) meta.appendChild(metaCell('PRIORITY', (a.priority > 0 ? '+' : '') + a.priority));
  if (a.statMult) {
    const parts = Object.entries(a.statMult).map(([k, v]) => `${k.toUpperCase()} ${v >= 0 ? '+' : ''}${Math.round(v*100)}%`);
    meta.appendChild(metaCell('BUFF', parts.join(' '), '', true));
  }
  if (a.healPercent) meta.appendChild(metaCell('HEAL/TURN', Math.round(a.healPercent*100) + '%', '', true));
  if (a.healTurns) meta.appendChild(metaCell('DURATION', a.healTurns + ' turns'));
  if (a.hpCost) meta.appendChild(metaCell('HP COST', Math.round(a.hpCost*100) + '%'));
  m.appendChild(meta);
  // description
  m.appendChild(el('div', { class: 'tooltip-desc' }, a.desc));
  // close
  const closeRow = el('div', { class: 'modal-actions' });
  closeRow.appendChild(el('button', { class: 'primary', onclick: () => { root.innerHTML = ''; } }, 'Close'));
  m.appendChild(closeRow);
  bg.appendChild(m);
  root.appendChild(bg);
}
function metaCell(label, val, valCls, wide) {
  const cell = el('div', { class: 'tooltip-meta-cell' + (wide ? ' wide' : '') });
  cell.appendChild(el('div', { class: 'tooltip-meta-label' }, label));
  cell.appendChild(el('div', { class: 'tooltip-meta-val' + (valCls ? ' ' + valCls : '') }, val));
  return cell;
}

function renderHeader() {
  return el('div', { class: 'header-stats' }, [
    el('div', { class: 'header-stat' }, [
      el('div', { class: 'header-stat-label' }, 'WAVE'),
      el('div', { class: 'header-stat-value' }, `${state.wave} / ${TOTAL_WAVES}`),
    ]),
    el('div', { class: 'header-stat' }, [
      el('div', { class: 'header-stat-label' }, 'PARTY'),
      el('div', { class: 'header-stat-value' }, String(state.party.length)),
    ]),
    el('div', { class: 'header-stat' }, [
      el('div', { class: 'header-stat-label' }, 'RESERVE'),
      el('div', { class: 'header-stat-value' }, String(state.reserve.length)),
    ]),
    el('div', { class: 'header-stat' }, [
      el('div', { class: 'header-stat-label' }, 'NEXT BREED'),
      el('div', { class: 'header-stat-value' }, (() => {
        const ws = [3,6,9].filter(x => x >= state.wave);
        if (!ws.length) return '—';
        return `W${ws[0]}`;
      })()),
    ]),
  ]);
}

function render() {
  const root = app();
  root.innerHTML = '';
  root.appendChild(el('h1', {}, 'BLOODLINES'));
  root.appendChild(el('div', { class: 'subtitle' }, 'a creature breeding roguelite'));
  if (state.screen !== 'start' && state.screen !== 'starter_pick' && state.screen !== 'bloodline_ready' && state.screen !== 'victory' && state.screen !== 'gameover') {
    root.appendChild(renderHeader());
  }
  switch (state.screen) {
    case 'start': renderStart(); break;
    case 'starter_pick': renderStarterPick(); break;
    case 'bloodline_ready': renderBloodlineReady(); break;
    case 'prebattle': renderPreBattle(); break;
    case 'battle': renderBattle(); break;
    case 'aftermath': renderAftermath(); break;
    case 'breed': renderBreed(); break;
    case 'victory': renderVictory(); break;
    case 'gameover': renderGameover(); break;
  }
}

// ============================================================
// SCREENS
// ============================================================

function renderStart() {
  const panel = el('div', { class: 'panel' });
  panel.appendChild(el('div', { class: 'panel-title' }, 'The Bloodline Awaits'));
  panel.appendChild(el('p', { style: 'color: var(--text-dim); font-size: 13px; line-height: 1.6; margin-bottom: 12px;' },
    'Begin with two starters. After every battle you capture the defeated creature. Every three waves the bloodline ritual demands a sacrifice — pick two pairs from your five creatures, breed them into your new party of two, and release the rest. The deepest bloodlines triumph at wave ten.'
  ));
  panel.appendChild(el('p', { style: 'color: var(--text-dim); font-size: 12px; line-height: 1.5; margin-bottom: 16px;' },
    'Each creature has a passive ability that defines its identity. Breeding inherits one passive from each parent.'
  ));
  panel.appendChild(el('button', { class: 'primary', style: 'display: block; margin: 0 auto;', onclick: () => { state.screen = 'starter_pick'; render(); } }, 'Begin'));
  app().appendChild(panel);
}

function renderStarterPick() {
  const panel = el('div', { class: 'panel' });
  panel.appendChild(el('div', { class: 'panel-title' }, `Choose your first starter (1/2)`));
  panel.appendChild(el('p', { style: 'color: var(--text-dim); font-size: 12px; margin-bottom: 12px;' },
    state.party.length === 0 ? 'Pick your first companion.' : 'Pick your second companion.'
  ));

  const starters = TEMPLATES.filter(t => t.starter);
  const grid = el('div', { class: 'roster-grid' });
  for (const t of starters) {
    if (state.party.find(c => c.species === t.species)) continue;
    const preview = makeCreature(t, 1);
    grid.appendChild(creatureCardEl(preview, {
      selectable: true,
      onclick: () => {
        sfx('select');
        state.party.push(preview);
        if (state.party.length < 2) {
          render();
        } else {
          state.screen = 'bloodline_ready';
          render();
        }
      },
    }));
  }
  panel.appendChild(grid);
  app().appendChild(panel);
}

function renderBloodlineReady() {
  const panel = el('div', { class: 'panel ready-panel' });
  panel.appendChild(el('div', { class: 'panel-title' }, 'Your bloodline begins'));
  panel.appendChild(el('p', { style: 'color: var(--text-dim); font-size: 12px; margin-bottom: 14px;' },
    'Two creatures stand at the start of your line. Long-press a card to inspect their abilities and passives.'
  ));
  for (const c of state.party) {
    panel.appendChild(creatureCardEl(c));
  }
  panel.appendChild(el('button', { class: 'primary', style: 'margin-top: 14px; display: block; width: 100%;', onclick: () => {
    state.wave = 1;
    state.enemyParty = generateEnemyParty(state.wave, partyAvgLevel(state.party));
    state.enemyActiveIdx = 0;
    state.enemy = state.enemyParty[0];
    state.screen = 'prebattle';
    render();
  } }, 'Enter the gauntlet'));
  app().appendChild(panel);
}

function renderPreBattle() {
  const panel = el('div', { class: 'panel' });
  const isBoss = state.wave === TOTAL_WAVES;
  panel.appendChild(el('div', { class: 'panel-title' }, isBoss ? `Final wave — Apex enemies appear` : `Wave ${state.wave} approaches`));

  // show both enemies
  panel.appendChild(el('div', { style: 'color: var(--text-dim); font-size: 12px; margin-bottom: 6px;' }, `Enemies (${state.enemyParty.length}):`));
  for (const e of state.enemyParty) {
    panel.appendChild(creatureCardEl(e));
  }

  // show party — pick lead fighter
  panel.appendChild(el('div', { style: 'color: var(--text-dim); font-size: 12px; margin: 14px 0 6px;' }, 'Lead with:'));
  for (let i = 0; i < state.party.length; i++) {
    const c = state.party[i];
    panel.appendChild(creatureCardEl(c, {
      selectable: true,
      onclick: () => {
        sfx('select');
        state.activeIdx = i;
        beginBattle();
      },
    }));
  }
  app().appendChild(panel);
}

function beginBattle() {
  const playerActive = state.party[state.activeIdx];
  const playerBench = state.party[1 - state.activeIdx] || null;
  state.pf = freshFighter(playerActive);
  state.bf = playerBench ? freshFighter(playerBench) : null;
  // Enemy party — both creatures get fighter objects so statuses tick on bench too.
  state.enemyActiveIdx = 0;
  state.ef = freshFighter(state.enemyParty[0]);
  state.ebf = state.enemyParty.length > 1 ? freshFighter(state.enemyParty[1]) : null;
  state.enemy = state.enemyParty[0];
  applyBattleStartPassives(state.pf, state.ef);
  if (state.bf) applyBattleStartPassives(state.bf, state.ef);
  if (state.ebf) applyBattleStartPassives(state.ebf, state.pf);
  state.pCharge = null;
  state.eCharge = null;
  state.log = [];
  const enemiesDesc = state.enemyParty.map(e => displayName(e)).join(' and ');
  pushLog(`Wild ${enemiesDesc} appear.`);
  state.acting = false;
  state.screen = 'battle';
  render();
}

function pushLog(msg, cls = '') { state.log.push({ msg, cls }); if (state.log.length > 30) state.log.shift(); }

function renderBattle() {
  const panel = el('div', { class: 'panel' });
  panel.appendChild(el('div', { class: 'panel-title' }, `Wave ${state.wave} — battle`));

  // stage — main actors plus tiny bench shadows behind them so the player can see all 4 fighters at once.
  const stage = el('div', { class: 'stage', id: 'stage' });
  // Player bench shadow (behind & to the left of player active)
  if (state.bf && state.bf.hp > 0) {
    const pBench = el('div', { class: 'stage-bench player' });
    pBench.innerHTML = renderCreatureSvg(state.bf.creature);
    stage.appendChild(pBench);
  }
  const pActor = el('div', { class: 'stage-actor player idle' });
  pActor.id = 'p-actor';
  pActor.innerHTML = renderCreatureSvg(state.pf.creature);
  stage.appendChild(pActor);
  const eActor = el('div', { class: 'stage-actor enemy idle' });
  eActor.id = 'e-actor';
  const eSvg = renderCreatureSvg(state.ef.creature);
  eActor.innerHTML = `<div style="transform: scaleX(-1);">${eSvg}</div>`;
  stage.appendChild(eActor);
  // Enemy bench shadow (behind & to the right of enemy active)
  if (state.ebf && state.ebf.hp > 0) {
    const eBench = el('div', { class: 'stage-bench enemy' });
    eBench.innerHTML = `<div style="transform: scaleX(-1);">${renderCreatureSvg(state.ebf.creature)}</div>`;
    stage.appendChild(eBench);
  }
  panel.appendChild(stage);

  // active HUDs
  const hud = el('div', { class: 'battle-hud' });
  hud.appendChild(actorHudEl(state.pf, 'player'));
  hud.appendChild(actorHudEl(state.ef, 'enemy'));
  panel.appendChild(hud);

  // bench row — small representations of bench creatures (player left, enemy right)
  if (state.bf || state.ebf) {
    const benchRow = el('div', { class: 'bench-row' });
    benchRow.appendChild(benchCreatureEl(state.bf, 'player'));
    benchRow.appendChild(benchCreatureEl(state.ebf, 'enemy'));
    panel.appendChild(benchRow);
  }

  // abilities — Pokémon-style 2x2 grid + SWAP button.
  const grid = el('div', { class: 'ability-grid pokemon' });
  if (state.pf.charging) {
    // Player is mid-charge. Show one big "Release" button covering the whole grid.
    const a = state.pf.chargeAbility;
    let cls = 'ability-btn pokemon-btn release-btn';
    if (a.element) cls += ' elem-' + a.element;
    if ((a.kind === 'attack' || a.kind === 'charge_attack') && a.element) {
      const m = TYPE_CHART[a.element][state.ef.creature.type];
      if (m > 1) cls += ' eff-good';
      else if (m < 1) cls += ' eff-bad';
    }
    const btn = el('button', { class: cls, style: 'grid-column: 1 / -1; min-height: 110px;' });
    btn.appendChild(el('div', { class: 'name', style: 'font-size: 14px; color: var(--text-faint); letter-spacing: 2px;' }, 'RELEASE'));
    btn.appendChild(el('div', { class: 'name', style: 'font-size: 18px; margin-top: 4px;' }, [
      a.element ? el('span', { class: 'type-pip ' + a.element }) : null,
      a.name,
    ].filter(Boolean)));
    if (a.power && a.power > 0) btn.appendChild(el('div', { class: 'dmg-value', style: 'font-size: 28px; margin-top: 4px;' }, String(a.power)));
    if (state.acting) btn.disabled = true;
    attachLongPress(btn,
      () => openAbilityTooltip(Object.keys(ABILITIES).find(k => ABILITIES[k] === a) || ''),
      state.acting ? null : () => playerAct(null) // null because the move is the stored charge
    );
    grid.appendChild(btn);
  } else {
    for (const k of state.pf.creature.abilities) {
      const a = ABILITIES[k];
      if (!a) continue;
      let cls = 'ability-btn pokemon-btn';
      let starTag = false;
      // Super-effective indicator: star, not green glow, no number.
      if ((a.kind === 'attack' || a.kind === 'charge_attack') && a.element) {
        const mult = TYPE_CHART[a.element][state.ef.creature.type];
        if (mult > 1) starTag = true;
      }
      if (a.element) cls += ' elem-' + a.element;
      const btn = el('button', { class: cls });
      btn.appendChild(el('div', { class: 'name' }, [
        a.element ? el('span', { class: 'type-pip ' + a.element }) : null,
        a.name,
      ].filter(Boolean)));
      // Damage value = base power (10-100), shown only for damaging moves.
      if (a.power && a.power > 0) {
        const hits = a.hits || 1;
        const label = hits > 1 ? `${a.power} × ${hits}` : `${a.power}`;
        btn.appendChild(el('div', { class: 'dmg-value' }, label));
      } else if (a.kind === 'apply_heal') {
        btn.appendChild(el('div', { class: 'dmg-value subtle heal' }, 'HEAL'));
      } else if (a.kind === 'buff') {
        btn.appendChild(el('div', { class: 'dmg-value subtle' }, 'BUFF'));
      } else if (a.kind === 'debuff') {
        btn.appendChild(el('div', { class: 'dmg-value subtle' }, 'STATUS'));
      } else if (a.kind === 'swap_self') {
        btn.appendChild(el('div', { class: 'dmg-value subtle' }, 'SWAP'));
      } else if (a.kind === 'bench_support') {
        btn.appendChild(el('div', { class: 'dmg-value subtle heal' }, 'BENCH'));
      } else if (a.kind === 'charge_attack' && !a.power) {
        btn.appendChild(el('div', { class: 'dmg-value subtle' }, 'CHARGE'));
      }
      if (starTag) btn.appendChild(el('div', { class: 'eff-star' }, '★'));
      if (state.acting) btn.disabled = true;
      attachLongPress(btn,
        () => openAbilityTooltip(k),
        state.acting ? null : () => playerAct(k)
      );
      grid.appendChild(btn);
    }
  }
  panel.appendChild(grid);

  // SWAP button
  const canSwap = state.bf && state.bf.hp > 0 && !state.acting;
  const swapBtn = el('button', { class: 'swap-btn' + (canSwap ? '' : ' disabled') });
  swapBtn.appendChild(el('span', { class: 'swap-icon' }, '⇄'));
  swapBtn.appendChild(el('span', {}, state.bf
    ? `Swap to ${displayName(state.bf.creature)}`
    : 'No bench available'));
  if (canSwap) {
    swapBtn.addEventListener('click', () => playerSwap());
  } else {
    swapBtn.disabled = true;
  }
  panel.appendChild(swapBtn);

  panel.appendChild(el('div', { style: 'text-align: center; font-size: 10px; color: var(--text-faint); margin-top: 6px; letter-spacing: 1px;' }, 'TAP TO USE · LONG-PRESS FOR DETAILS'));

  // log
  const logEl = el('div', { class: 'battle-log' });
  for (const entry of state.log.slice(-6)) {
    logEl.appendChild(el('div', { class: 'log-line ' + entry.cls }, entry.msg));
  }
  panel.appendChild(logEl);

  app().appendChild(panel);
}

// Small bench creature element. Long-press opens inspect modal.
// Bench creature panel — mirror of actorHudEl but more compact. Includes HP text, HP bar, and
// status chips. Updates real-time because renderBattle re-runs after every action.
function benchCreatureEl(f, side) {
  const wrap = el('div', { class: 'bench-slot ' + side });
  if (!f) {
    wrap.appendChild(el('div', { class: 'bench-empty' }, '— no bench —'));
    return wrap;
  }
  // Left side (player) gets portrait-on-left, right side (enemy) reverses.
  const portrait = el('div', { class: 'bench-portrait' });
  portrait.innerHTML = side === 'enemy'
    ? `<div style="transform: scaleX(-1);">${renderCreatureSvg(f.creature)}</div>`
    : renderCreatureSvg(f.creature);
  wrap.appendChild(portrait);
  const info = el('div', { class: 'bench-info' });
  // Name + type pip
  const nameRow = el('div', { class: 'bench-name-row' });
  nameRow.appendChild(el('span', { class: 'type-pip ' + f.creature.type }));
  nameRow.appendChild(el('span', { class: 'bench-name' }, displayName(f.creature)));
  nameRow.appendChild(el('span', { class: 'bench-level' }, `L${f.creature.level}`));
  info.appendChild(nameRow);
  // HP text + bar
  const hpPct = Math.max(0, f.hp / f.creature.maxHp);
  info.appendChild(el('div', { class: 'bench-hp-text' }, `${Math.max(0, f.hp)} / ${f.creature.maxHp}`));
  const bar = el('div', { class: 'bench-hp' });
  const fill = el('div', { class: 'bench-hp-fill' });
  fill.style.width = `${Math.round(hpPct * 100)}%`;
  if (hpPct < 0.25) fill.style.background = '#cc5555';
  else if (hpPct < 0.5) fill.style.background = '#cc9955';
  else fill.style.background = '#66cc66';
  bar.appendChild(fill);
  info.appendChild(bar);
  // Status chips — same shape as the active HUD's chips
  const status = el('div', { class: 'bench-status' });
  if (f.statuses) {
    if (f.statuses.burn) status.appendChild(el('span', { class: 'status-chip burn' }, `BURN ${f.statuses.burn.turns}`));
    if (f.statuses.bloom) status.appendChild(el('span', { class: 'status-chip heal' }, `BLOOM ${f.statuses.bloom.turns}`));
    if (f.statuses.soaking) status.appendChild(el('span', { class: 'status-chip slow' }, `SOAKED ${f.statuses.soaking.turns}`));
    if (f.statuses.cursed) status.appendChild(el('span', { class: 'status-chip debuff' }, 'CURSED'));
    if (f.statuses.dazed) status.appendChild(el('span', { class: 'status-chip slow' }, `DAZED ${f.statuses.dazed.turns}`));
  }
  if (status.children.length) info.appendChild(status);
  wrap.appendChild(info);
  attachLongPress(wrap, () => openInspectModal(f.creature), null);
  return wrap;
}

function actorHudEl(f, side) {
  const wrap = el('div', { class: 'actor-hud inspectable' });
  const head = el('div', { class: 'actor-hud-name' });
  head.appendChild(el('span', {}, [
    el('span', { class: 'type-pip ' + f.creature.type }),
    el('span', {}, displayName(f.creature)),
  ]));
  head.appendChild(el('span', { class: 'type-' + f.creature.type, style: 'font-size: 10px; letter-spacing: 2px;' }, f.creature.type.toUpperCase()));
  wrap.appendChild(head);

  wrap.appendChild(el('div', { class: 'hp-line' }, `HP ${Math.max(0, f.hp)} / ${f.creature.maxHp}`));
  const hpBar = el('div', { class: 'hp-bar' });
  const pct = Math.max(0, f.hp / f.creature.maxHp);
  let cls = 'hp-fill';
  if (pct < 0.25) cls += ' critical';
  else if (pct < 0.5) cls += ' low';
  hpBar.appendChild(el('div', { class: cls, style: `width:${pct*100}%;` }));
  wrap.appendChild(hpBar);
  // long-press the entire HUD (including HP bar) to open inspect modal
  attachLongPress(wrap, () => openInspectModal(f.creature), null);

  // status chips
  const status = el('div', { class: 'status-row' });
  if (f.healing && f.healing.turnsLeft > 0) {
    status.appendChild(el('span', { class: 'status-chip heal' }, `HEAL ${f.healing.turnsLeft}`));
  }
  if (f.statuses && f.statuses.burn) status.appendChild(el('span', { class: 'status-chip burn' }, `BURN ${f.statuses.burn.turns}`));
  if (f.statuses && f.statuses.bloom) status.appendChild(el('span', { class: 'status-chip heal' }, `BLOOM ${f.statuses.bloom.turns}`));
  if (f.statuses && f.statuses.soaking) status.appendChild(el('span', { class: 'status-chip slow' }, `SOAKED ${f.statuses.soaking.turns}`));
  if (f.statuses && f.statuses.cursed) status.appendChild(el('span', { class: 'status-chip debuff' }, `CURSED ${f.statuses.cursed.turns}`));
  if (f.statuses && f.statuses.dazed) status.appendChild(el('span', { class: 'status-chip slow' }, `DAZED ${f.statuses.dazed.turns}`));
  // statMods are multiplicative deltas. Show as percentage.
  const pctFmt = (v) => `${v >= 0 ? '+' : ''}${Math.round(v * 100)}%`;
  const positives = [];
  const negatives = [];
  if (f.statMods.atk > 0.01) positives.push(`ATK ${pctFmt(f.statMods.atk)}`);
  if (f.statMods.def > 0.01) positives.push(`DEF ${pctFmt(f.statMods.def)}`);
  if (f.statMods.spd > 0.01) positives.push(`SPD ${pctFmt(f.statMods.spd)}`);
  if (f.statMods.atk < -0.01) negatives.push(`ATK ${pctFmt(f.statMods.atk)}`);
  if (f.statMods.def < -0.01) negatives.push(`DEF ${pctFmt(f.statMods.def)}`);
  if (f.statMods.spd < -0.01) negatives.push(`SPD ${pctFmt(f.statMods.spd)}`);
  if (positives.length) status.appendChild(el('span', { class: 'status-chip buff' }, positives.join(' ')));
  if (negatives.length) status.appendChild(el('span', { class: 'status-chip debuff' }, negatives.join(' ')));
  if (status.children.length) wrap.appendChild(status);

  return wrap;
}

function spawnFloat(side, text, kind = 'dmg') {
  const stage = document.getElementById('stage');
  if (!stage) return;
  const f = el('div', { class: 'floating ' + (kind === 'crit' ? 'crit' : kind === 'heal' ? 'heal' : '') }, text);
  if (side === 'player') { f.style.left = '60px'; f.style.bottom = '160px'; }
  else { f.style.right = '60px'; f.style.bottom = '160px'; }
  stage.appendChild(f);
  setTimeout(() => f.remove(), 1000);
}
function spawnCallout(text) {
  const stage = document.getElementById('stage');
  if (!stage) return;
  const c = el('div', { class: 'callout' }, text);
  stage.appendChild(c);
  setTimeout(() => c.remove(), 950);
}
function shakeStage() {
  const stage = document.getElementById('stage');
  if (!stage) return;
  stage.classList.add('shake');
  setTimeout(() => stage.classList.remove('shake'), 360);
}
function playLunge(side) {
  const a = document.getElementById(side === 'player' ? 'p-actor' : 'e-actor');
  if (!a) return;
  a.classList.remove('idle'); a.classList.add('lunge');
  setTimeout(() => { a.classList.remove('lunge'); a.classList.add('idle'); }, 360);
}
function playRecoil(side) {
  const a = document.getElementById(side === 'player' ? 'p-actor' : 'e-actor');
  if (!a) return;
  a.style.setProperty('--rx', side === 'player' ? '-12px' : '12px');
  a.classList.remove('idle'); a.classList.add('recoil');
  setTimeout(() => { a.classList.remove('recoil'); a.classList.add('idle'); }, 320);
}

// ============================================================
// TURN RESOLUTION
// ============================================================

// Apply the cursed-on-swap penalty if the swapping-out fighter has cursed status.
// Returns the damage dealt (could be 0 if not cursed).
function applyCursedOnSwap(f, side) {
  if (!f || !f.statuses || !f.statuses.cursed) return 0;
  const dmg = Math.max(1, Math.round(f.creature.maxHp * f.statuses.cursed.percentOnSwap));
  f.hp = Math.max(0, f.hp - dmg);
  spawnFloat(side, String(dmg), 'crit');
  pushLog(`${displayName(f.creature)} suffers ${dmg} from the curse on swap-out!`, 'eff');
  return dmg;
}

// Handle player swap to the bench. High-priority; opponent still acts on the new active.
async function playerSwap() {
  if (state.acting) return;
  if (!state.bf || state.bf.hp <= 0) return;
  state.acting = true;
  // Cursed-on-swap-out hits the outgoing fighter
  applyCursedOnSwap(state.pf, 'player');
  // The outgoing fighter's charge fizzles
  if (state.pf.charging) {
    pushLog(`${displayName(state.pf.creature)}'s ${state.pf.chargeAbility.name} fizzles!`, 'eff');
    state.pf.charging = null;
    state.pf.chargeAbility = null;
  }
  pushLog(`${displayName(state.pf.creature)} swaps to the bench.`, 'eff');
  sfx('select');
  const tag_outActive = hasPassive(state.pf, 'tag_out');
  const out = state.pf;
  state.pf = state.bf;
  state.bf = out;
  state.activeIdx = 1 - state.activeIdx;
  state.pf.onBench = false;
  state.bf.onBench = true;
  // Swap-in passive triggers on the incoming creature (now state.pf)
  if (hasPassive(state.pf, 'vanguard')) {
    state.pf.statMods.atk += 0.5;
    state.pf.vanguardActive = true;
    pushLog(`${displayName(state.pf.creature)}'s Vanguard surges forward!`, 'eff');
  }
  if (hasPassive(state.pf, 'second_wind')) {
    const healed = applyHeal(state.pf, Math.round(state.pf.creature.maxHp * 0.15));
    if (healed > 0) {
      spawnFloat('player', `+${healed}`, 'heal');
      pushLog(`${displayName(state.pf.creature)}'s Second Wind heals ${healed}.`);
    }
  }
  if (tag_outActive) {
    cleanseStatuses(state.pf);
    pushLog(`Tag Out cleanses ${displayName(state.pf.creature)}.`, 'eff');
  }
  render();
  await sleep(500);
  // Opponent still acts. If enemy is mid-charge, release. Otherwise pick a move.
  if (state.ef.hp > 0 && state.pf.hp > 0) {
    let releasing = false;
    let enemyAbility;
    if (state.ef.charging) {
      releasing = true;
      enemyAbility = state.ef.chargeAbility;
    } else {
      enemyAbility = ABILITIES[aiChoose(state.ef, state.pf)];
    }
    tickStartOfTurn(state.ef, 'enemy');
    if (state.ef.hp > 0) {
      if (releasing) {
        state.ef.charging = null;
        state.ef.chargeAbility = null;
        await releaseCharge('enemy', state.ef, state.pf, enemyAbility);
      } else {
        await resolveAction('enemy', state.ef, state.pf, enemyAbility);
      }
      render();
      await sleep(500);
    }
  }
  if (state.bf && state.bf.hp > 0) tickFighterStatuses(state.bf, 'player', true);
  if (state.ebf && state.ebf.hp > 0) tickFighterStatuses(state.ebf, 'enemy', true);
  await handleFaintsIfAny();
  state.acting = false;
  render();
}

// Force-swap to bench when active faints. Returns true if a swap happened (battle continues),
// false if there's no bench to swap to (battle ends).
async function handleFaintsIfAny() {
  // Player active fainted → forced swap or game over
  if (state.pf.hp <= 0) {
    pushLog(`${displayName(state.pf.creature)} fainted!`, 'eff');
    sfx('faint');
    if (state.bf && state.bf.hp > 0) {
      pushLog(`${displayName(state.bf.creature)} steps in.`, 'eff');
      const out = state.pf;
      state.pf = state.bf;
      state.bf = out;
      state.activeIdx = 1 - state.activeIdx;
      state.pCharge = null;
      render();
      await sleep(700);
    } else {
      state.screen = 'gameover';
      render();
      return false;
    }
  }
  // Enemy active fainted → forced swap or wave-clear
  if (state.ef.hp <= 0) {
    pushLog(`${displayName(state.ef.creature)} fainted!`, 'eff');
    sfx('faint');
    if (state.ebf && state.ebf.hp > 0) {
      pushLog(`${displayName(state.ebf.creature)} steps in.`, 'eff');
      const out = state.ef;
      state.ef = state.ebf;
      state.ebf = out;
      state.enemyActiveIdx = 1 - state.enemyActiveIdx;
      state.enemy = state.enemyParty[state.enemyActiveIdx];
      state.eCharge = null;
      render();
      await sleep(700);
    } else {
      // wave clear
      render();
      await sleep(700);
      finishBattleIfDone();
      return false;
    }
  }
  return true;
}

async function playerAct(abilityKey) {
  if (state.acting) return;
  state.acting = true;

  // If the player's active is mid-charge, the action they take this turn is to release.
  // Override abilityKey with the charging move and flag for releaseCharge dispatch.
  let pReleasing = false;
  let playerAbility;
  if (state.pf.charging) {
    pReleasing = true;
    playerAbility = state.pf.chargeAbility;
  } else {
    playerAbility = ABILITIES[abilityKey];
  }

  // Same on enemy side: if mid-charge, AI ignores its choice and releases.
  let eReleasing = false;
  let enemyKey = null;
  let enemyAbility;
  let enemySwapping = false;
  if (state.ef.charging) {
    eReleasing = true;
    enemyAbility = state.ef.chargeAbility;
  } else {
    enemyKey = aiChoose(state.ef, state.pf);
    if (enemyKey === '_swap') {
      enemySwapping = true;
      // Use a synthetic priority-3 ability for ordering
      enemyAbility = { name: 'Swap', kind: 'swap_self', priority: 3 };
    } else {
      enemyAbility = ABILITIES[enemyKey];
    }
  }

  // Priority: releases use the priority of the original move.
  const pPrio = playerAbility.priority || 0;
  const ePrio = enemyAbility.priority || 0;
  const pSpd = effectiveStat(state.pf, 'spd');
  const eSpd = effectiveStat(state.ef, 'spd');
  let pFirst;
  if (pPrio !== ePrio) pFirst = pPrio > ePrio;
  else if (pSpd !== eSpd) pFirst = pSpd > eSpd;
  else {
    if (hasPassive(state.pf, 'featherweight')) pFirst = true;
    else if (hasPassive(state.ef, 'featherweight')) pFirst = false;
    else pFirst = Math.random() < 0.5;
  }

  // Build the action turns. Each turn entry: [side, releasing, swapping, ability]
  const playerTurn = ['player', pReleasing, false, playerAbility];
  const enemyTurn  = ['enemy',  eReleasing, enemySwapping, enemyAbility];
  const order = pFirst ? [playerTurn, enemyTurn] : [enemyTurn, playerTurn];

  for (const [side, releasing, swapping, ability] of order) {
    if (state.pf.hp <= 0 || state.ef.hp <= 0) break;
    const attacker = side === 'player' ? state.pf : state.ef;
    let defender = side === 'player' ? state.ef : state.pf;
    tickStartOfTurn(attacker, side);
    if (attacker.hp <= 0) break;
    if (swapping) {
      // Enemy swap: cursed-on-swap, then perform swap. Charge fizzles.
      applyCursedOnSwap(state.ef, 'enemy');
      if (state.ef.charging) {
        pushLog(`${displayName(state.ef.creature)}'s ${state.ef.chargeAbility.name} fizzles!`, 'eff');
        state.ef.charging = null;
        state.ef.chargeAbility = null;
      }
      pushLog(`${displayName(state.ef.creature)} swaps to its bench.`, 'eff');
      const out = state.ef;
      state.ef = state.ebf;
      state.ebf = out;
      state.enemyActiveIdx = 1 - state.enemyActiveIdx;
      state.enemy = state.enemyParty[state.enemyActiveIdx];
      sfx('select');
    } else if (releasing) {
      attacker.charging = null;
      attacker.chargeAbility = null;
      await releaseCharge(side, attacker, defender, ability);
    } else {
      await resolveAction(side, attacker, defender, ability);
    }
    render();
    await sleep(550);
  }

  // bench tick
  if (state.bf && state.bf.hp > 0) tickFighterStatuses(state.bf, 'player', true);
  if (state.ebf && state.ebf.hp > 0) tickFighterStatuses(state.ebf, 'enemy', true);

  const cont = await handleFaintsIfAny();
  if (!cont) return;

  state.acting = false;
  render();
}

// ============================================================
// STATUS APPLICATION HELPERS — burn/bloom/soaking/cursed/dazed
// ============================================================

// Apply or refresh a status. Iron Will blocks debuff statuses.
function applyStatus(f, type, opts) {
  opts = opts || {};
  if (hasPassive(f, 'iron_will') && (type === 'soaking' || type === 'dazed' || type === 'cursed')) return false;
  if (type === 'burn') {
    f.statuses.burn = { turns: opts.turns || 4, percentPerTurn: opts.pct || 0.05 };
    return true;
  }
  if (type === 'bloom') {
    f.statuses.bloom = { turns: opts.turns || 4, percentPerTurn: opts.pct || 0.05 };
    return true;
  }
  if (type === 'soaking') {
    // Soaking: 4-turn -50% ATK debuff. Refreshes if reapplied.
    f.statuses.soaking = { turns: opts.turns || 4 };
    return true;
  }
  if (type === 'cursed') {
    f.statuses.cursed = { turns: opts.turns || 99, percentOnSwap: opts.pct || 0.30 };
    return true;
  }
  if (type === 'dazed') {
    f.statuses.dazed = { turns: opts.turns || 2 };
    return true;
  }
  return false;
}

// Cleanse all statuses.
function cleanseStatuses(f) {
  f.statuses.burn = null;
  f.statuses.bloom = null;
  f.statuses.soaking = null;
  f.statuses.cursed = null;
  f.statuses.dazed = null;
}

// Tick statuses (burn/bloom/soaking/dazed/cursed). Used for active and bench fighters.
function tickFighterStatuses(f, side, isBench) {
  // Sentinel: heal 5% max HP per turn while on bench
  if (isBench && hasPassive(f, 'sentinel')) {
    applyHeal(f, Math.max(1, Math.round(f.creature.maxHp * 0.05)));
  }
  // Spotter compounds with bench ticks: 30% reduction to incoming bench damage
  const spotterMult = (isBench && hasPassive(f, 'spotter')) ? 0.7 : 1.0;
  if (f.statuses.burn && f.statuses.burn.turns > 0) {
    const dmg = Math.max(1, Math.round(f.creature.maxHp * f.statuses.burn.percentPerTurn * spotterMult));
    f.hp = Math.max(0, f.hp - dmg);
    if (!isBench) {
      spawnFloat(side, String(dmg), 'dmg');
      pushLog(`${displayName(f.creature)} burns for ${dmg}.`);
    }
    f.statuses.burn.turns--;
    if (f.statuses.burn.turns <= 0) f.statuses.burn = null;
  }
  if (f.statuses.bloom && f.statuses.bloom.turns > 0) {
    const healed = applyHeal(f, Math.max(1, Math.round(f.creature.maxHp * f.statuses.bloom.percentPerTurn)));
    if (healed > 0 && !isBench) {
      spawnFloat(side, `+${healed}`, 'heal');
      pushLog(`${displayName(f.creature)} blooms for +${healed}.`);
    }
    f.statuses.bloom.turns--;
    if (f.statuses.bloom.turns <= 0) f.statuses.bloom = null;
  }
  if (f.statuses.soaking && f.statuses.soaking.turns > 0) {
    f.statuses.soaking.turns--;
    if (f.statuses.soaking.turns <= 0) f.statuses.soaking = null;
  }
  if (f.statuses.dazed && f.statuses.dazed.turns > 0) {
    f.statuses.dazed.turns--;
    if (f.statuses.dazed.turns <= 0) f.statuses.dazed = null;
  }
  if (f.statuses.cursed && f.statuses.cursed.turns > 0) {
    f.statuses.cursed.turns--;
    if (f.statuses.cursed.turns <= 0) f.statuses.cursed = null;
  }
}

function tickStartOfTurn(f, side) {
  if (f.healing && f.healing.turnsLeft > 0) {
    const healed = applyHeal(f, f.healing.perTurn);
    f.healing.turnsLeft--;
    if (f.healing.turnsLeft <= 0) f.healing = null;
    if (healed > 0) {
      spawnFloat(side, `+${healed}`, 'heal');
      pushLog(`${displayName(f.creature)} heals ${healed} from Mend.`);
    }
  }
  if (hasPassive(f, 'photosynthesis')) {
    const healed = applyHeal(f, Math.max(1, Math.round(f.creature.maxHp * 0.06)));
    if (healed > 0) {
      spawnFloat(side, `+${healed}`, 'heal');
      pushLog(`${displayName(f.creature)}'s Photosynthesis heals ${healed}.`);
    }
  }
  if (hasPassive(f, 'hex_eater')) {
    // Cleanse one debuff. Priority: status > stat-mod
    if (f.statuses.soaking) f.statuses.soaking = null;
    else if (f.statuses.burn) f.statuses.burn = null;
    else if (f.statuses.dazed) f.statuses.dazed = null;
    else if (f.statMods.atk < 0) f.statMods.atk = Math.min(0, f.statMods.atk + 0.15);
    else if (f.statMods.def < 0) f.statMods.def = Math.min(0, f.statMods.def + 0.15);
    else if (f.statMods.spd < 0) f.statMods.spd = Math.min(0, f.statMods.spd + 0.15);
  }
  if (hasPassive(f, 'slow_burn')) {
    f.slowBurnStacks = Math.min(5, (f.slowBurnStacks || 0) + 1);
  }
  tickFighterStatuses(f, side, false);
  if (f.adrenalTurns > 0) {
    f.adrenalTurns--;
    if (f.adrenalTurns === 0 && f.adrenalAtkDelta) {
      f.statMods.atk -= f.adrenalAtkDelta;
      f.adrenalAtkDelta = 0;
    }
  }
  if (f.pendingSwapBuff) {
    for (const [k, v] of Object.entries(f.pendingSwapBuff)) {
      f.statMods[k] += v;
    }
    pushLog(`${displayName(f.creature)} arrives bolstered.`, 'eff');
    f.pendingSwapBuff = null;
  }
  if (f.pendingSwapHeal > 0) {
    const amt = Math.round(f.creature.maxHp * f.pendingSwapHeal);
    const healed = applyHeal(f, amt);
    if (healed > 0) {
      spawnFloat(side, `+${healed}`, 'heal');
      pushLog(`${displayName(f.creature)} arrives healed for ${healed}.`);
    }
    f.pendingSwapHeal = 0;
  }
  f.bracingThisTurn = false;
}

// Apply healing to a fighter, respecting passives:
// - Berserker blocks all healing
// - Blooming amplifies healing by 50%
// - Vampire Touch amplifies by 50% AND allows overheal up to 125% maxHp
// Returns the actual amount healed.
function applyHeal(f, baseAmount) {
  if (hasPassive(f, 'berserker')) return 0;
  let amt = baseAmount;
  if (hasPassive(f, 'blooming') || hasPassive(f, 'vampire_touch')) amt = Math.round(amt * 1.5);
  const cap = hasPassive(f, 'vampire_touch')
    ? Math.round(f.creature.maxHp * 1.25)
    : f.creature.maxHp;
  const before = f.hp;
  f.hp = Math.min(cap, f.hp + amt);
  return f.hp - before;
}

// Helper: process all post-hit consequences after a damaging hit landed.
// Used by both single-hit and multi-hit attacks so each hit independently rolls effects.
function processPostHit(side, oside, attacker, defender, ability, result) {
  // adrenal_surge
  if (hasPassive(defender, 'adrenal_surge') && defender.hp > 0) {
    if (result.dmg >= defender.creature.maxHp * 0.3) {
      if (!defender.adrenalTurns) {
        defender.statMods.atk += 0.3;
        defender.adrenalAtkDelta = 0.3;
      }
      defender.adrenalTurns = 3;
      pushLog(`${displayName(defender.creature)}'s Adrenal Surge triggers (+30% ATK)!`, 'eff');
    }
  }
  // soul_drain on attacker
  if (hasPassive(attacker, 'soul_drain')) {
    const healed = applyHeal(attacker, Math.round(result.dmg * 0.25));
    if (healed > 0) spawnFloat(side, `+${healed}`, 'heal');
  }
  // riposte
  if (hasPassive(defender, 'riposte') && defender.hp > 0) {
    const back = Math.round(result.dmg * 0.25);
    attacker.hp = Math.max(0, attacker.hp - back);
    spawnFloat(side, String(back), 'dmg');
    pushLog(`${displayName(defender.creature)}'s Riposte deals ${back} back.`);
  }
  // counterstance: when defender braced, reflect 50% of damage
  if (hasPassive(defender, 'counterstance') && defender.bracingThisTurn && defender.hp > 0) {
    const back = Math.round(result.dmg * 0.5);
    attacker.hp = Math.max(0, attacker.hp - back);
    spawnFloat(side, String(back), 'dmg');
    pushLog(`${displayName(defender.creature)}'s Counterstance reflects ${back}!`, 'eff');
  }
  // aquaveil rescue
  if (hasPassive(defender, 'aquaveil') && !defender.aquaveilUsed) {
    const halfHp = Math.round(defender.creature.maxHp * 0.5);
    if (defender.hp < halfHp && defender.hp > 0) {
      defender.hp = halfHp;
      defender.aquaveilUsed = true;
      spawnFloat(oside, `+${halfHp}`, 'heal');
      pushLog(`${displayName(defender.creature)}'s Aquaveil triggers!`, 'eff');
    }
  }
  // frostbite passive: -10% SPD on hit
  if (hasPassive(attacker, 'frostbite') && defender.hp > 0) {
    if (!hasPassive(defender, 'iron_will')) {
      defender.statMods.spd -= 0.10;
    }
  }
  // thornSoaking flag (set by Vapor Cloak): attackers who hit this fighter get soaked
  if (defender.thornSoaking && defender.hp > 0 && attacker.hp > 0) {
    applyStatus(attacker, 'soaking', { stacks: 1, turns: 4 });
  }
}

// Resolve the named ability effect (status applications, healing, etc.) — only after a damaging hit lands.
function resolveAbilityEffect(side, oside, attacker, defender, ability, result) {
  const effect = ability.effect;
  if (!effect || defender.hp <= 0) return;
  switch (effect) {
    case 'burn':
      applyStatus(defender, 'burn', { turns: hasPassive(attacker, 'pyromancer') ? 4 : 4, pct: 0.05 });
      pushLog(`${displayName(defender.creature)} is burning.`);
      break;
    case 'burn_long':
      applyStatus(defender, 'burn', { turns: 6, pct: 0.05 });
      pushLog(`${displayName(defender.creature)} is burning (long).`);
      break;
    case 'burn_stacking': {
      // Each consecutive use extends burn duration by +2.
      const cur = defender.statuses.burn ? defender.statuses.burn.turns : 0;
      applyStatus(defender, 'burn', { turns: Math.max(4, cur + 2), pct: 0.05 });
      pushLog(`${displayName(defender.creature)}'s burn smolders deeper.`);
      break;
    }
    case 'cursed_synergy':
      // Cursed_synergy applies cursed; the +50% damage if already-cursed is handled in calculateDamage.
      applyStatus(defender, 'cursed', { turns: 99, pct: 0.30 });
      pushLog(`${displayName(defender.creature)} is cursed.`);
      break;
    case 'execute_scale':
      // Damage scaling is handled in calculateDamage; this case has no extra effect.
      break;
    case 'soaking':
      applyStatus(defender, 'soaking', { stacks: 1, turns: 4 });
      pushLog(`${displayName(defender.creature)} is soaked.`);
      break;
    case 'soaking_double':
      applyStatus(defender, 'soaking', { stacks: 2, turns: 4 });
      pushLog(`${displayName(defender.creature)} is heavily soaked.`);
      break;
    case 'cursed':
      applyStatus(defender, 'cursed', { turns: 99, pct: 0.30 });
      pushLog(`${displayName(defender.creature)} is cursed.`);
      break;
    case 'dazed':
      applyStatus(defender, 'dazed', { turns: 2 });
      pushLog(`${displayName(defender.creature)} is dazed.`);
      break;
    case 'dazed_long':
      applyStatus(defender, 'dazed', { turns: 4 });
      pushLog(`${displayName(defender.creature)} is dazed (long).`);
      break;
    case 'cleanse_self':
      cleanseStatuses(attacker);
      attacker.statMods = { atk: 0, def: 0, spd: 0 };
      pushLog(`${displayName(attacker.creature)} is cleansed.`);
      break;
    case 'lifesteal_strong': {
      const healed = applyHeal(attacker, Math.round(result.dmg * 0.5));
      if (healed > 0) {
        spawnFloat(side, `+${healed}`, 'heal');
        pushLog(`${displayName(attacker.creature)} drains ${healed}.`);
      }
      break;
    }
    case 'lifesteal_full': {
      const healed = applyHeal(attacker, result.dmg);
      if (healed > 0) {
        spawnFloat(side, `+${healed}`, 'heal');
        pushLog(`${displayName(attacker.creature)} drains ${healed}.`);
      }
      break;
    }
    case 'bloom_self':
      applyStatus(attacker, 'bloom', { turns: 4, pct: 0.05 });
      pushLog(`${displayName(attacker.creature)} blooms.`);
      break;
    case 'bloom_self_long':
      applyStatus(attacker, 'bloom', { turns: 6, pct: 0.06 });
      pushLog(`${displayName(attacker.creature)} blooms (long).`);
      break;
    case 'wither_combo':
      applyStatus(defender, 'cursed', { turns: 99, pct: 0.30 });
      applyStatus(defender, 'soaking', { stacks: 1, turns: 4 });
      pushLog(`${displayName(defender.creature)} withers.`);
      break;
    case 'burn_both': {
      // Apply burn to opponent active AND own bench creature
      applyStatus(defender, 'burn', { turns: 4, pct: 0.05 });
      const ownBench = side === 'player' ? state.bf : state.ebf;
      if (ownBench && ownBench.hp > 0) {
        applyStatus(ownBench, 'burn', { turns: 4, pct: 0.05 });
        pushLog(`${displayName(defender.creature)} and ${displayName(ownBench.creature)} are both burning!`, 'eff');
      } else {
        pushLog(`${displayName(defender.creature)} is burning.`);
      }
      break;
    }
    case 'cursed_both': {
      applyStatus(defender, 'cursed', { turns: 99, pct: 0.30 });
      const ownBench = side === 'player' ? state.bf : state.ebf;
      if (ownBench && ownBench.hp > 0) {
        applyStatus(ownBench, 'cursed', { turns: 99, pct: 0.30 });
        pushLog(`${displayName(defender.creature)} and ${displayName(ownBench.creature)} are both cursed!`, 'eff');
      } else {
        pushLog(`${displayName(defender.creature)} is cursed.`);
      }
      break;
    }
    case 'bloom_both': {
      applyStatus(attacker, 'bloom', { turns: 4, pct: 0.05 });
      const ownBench = side === 'player' ? state.bf : state.ebf;
      if (ownBench && ownBench.hp > 0) {
        applyStatus(ownBench, 'bloom', { turns: 4, pct: 0.05 });
        pushLog(`${displayName(attacker.creature)} and ${displayName(ownBench.creature)} are both blooming!`, 'eff');
      } else {
        pushLog(`${displayName(attacker.creature)} blooms.`);
      }
      break;
    }
    case 'force_swap': {
      // Force the opposing side's active to swap to its bench. If no bench, no-op.
      const oppBench = side === 'player' ? state.ebf : state.bf;
      if (!oppBench || oppBench.hp <= 0) {
        pushLog(`${displayName(defender.creature)} has nowhere to swap.`, 'eff');
        break;
      }
      // Trigger cursed-on-swap on the forced-out fighter
      applyCursedOnSwap(defender, oside);
      pushLog(`${displayName(defender.creature)} is yanked from the field!`, 'eff');
      if (side === 'player') {
        // enemy active gets swapped
        const out = state.ef;
        state.ef = state.ebf;
        state.ebf = out;
        state.enemyActiveIdx = 1 - state.enemyActiveIdx;
        state.enemy = state.enemyParty[state.enemyActiveIdx];
        state.eCharge = null;
      } else {
        // player active gets swapped
        const out = state.pf;
        state.pf = state.bf;
        state.bf = out;
        state.activeIdx = 1 - state.activeIdx;
        state.pCharge = null;
      }
      break;
    }
    case 'thorn_soaking':
      // Mark this fighter so attackers get soaked when they hit it. Stored as a flag.
      attacker.thornSoaking = true;
      pushLog(`${displayName(attacker.creature)} cloaks itself in vapor.`);
      break;
  }
}

async function resolveAction(side, attacker, defender, ability) {
  const oside = side === 'player' ? 'enemy' : 'player';
  // HP cost up front for any move that has it
  if (ability.hpCost) {
    const cost = Math.round(attacker.creature.maxHp * ability.hpCost);
    attacker.hp = Math.max(1, attacker.hp - cost);
    spawnFloat(side, String(cost), 'dmg');
  }
  // Dazed: 50% chance to skip the action entirely (after paying costs — that's the punishment)
  if (attacker.statuses && attacker.statuses.dazed && Math.random() < 0.5) {
    pushLog(`${displayName(attacker.creature)} is dazed and can't act!`, 'eff');
    return;
  }
  if (ability.kind === 'attack') {
    pushLog(`${displayName(attacker.creature)} uses ${ability.name}.`);
    playLunge(side);
    await sleep(180);
    const hits = ability.hits || 1;
    for (let h = 0; h < hits; h++) {
      if (defender.hp <= 0) break;
      const result = calculateDamage(attacker, defender, ability);
      if (result.evaded) {
        spawnFloat(oside, 'EVADE', 'heal');
        sfx('select');
        pushLog(`${displayName(defender.creature)} evades the attack!`, 'eff');
        continue;
      }
      defender.hp = Math.max(0, defender.hp - result.dmg);
      spawnFloat(oside, String(result.dmg), result.crit ? 'crit' : 'dmg');
      if (h === 0) {
        if (result.mult > 1) spawnCallout('SUPER EFFECTIVE');
        else if (result.mult < 1) spawnCallout('NOT VERY...');
      }
      if (result.crit) sfx('crit'); else sfx('hit');
      shakeStage(); playRecoil(oside);
      pushLog(`Deals ${result.dmg} damage${result.crit ? ' (CRIT)' : ''}.${result.mult > 1 ? ' Super effective!' : result.mult < 1 ? ' Not very effective.' : ''}`, result.crit ? 'crit' : (result.mult !== 1 ? 'eff' : ''));
      processPostHit(side, oside, attacker, defender, ability, result);
      resolveAbilityEffect(side, oside, attacker, defender, ability, result);
      if (h < hits - 1) await sleep(220);
    }
  } else if (ability.kind === 'defend') {
    attacker.bracingThisTurn = true;
    pushLog(`${displayName(attacker.creature)} braces.`);
    sfx('select');
  } else if (ability.kind === 'apply_heal') {
    if (ability.healPercent && ability.healTurns) {
      const perTurn = Math.max(1, Math.round(attacker.creature.maxHp * ability.healPercent));
      attacker.healing = { perTurn, turnsLeft: ability.healTurns };
      pushLog(`${displayName(attacker.creature)} begins healing (+${perTurn}/turn for ${ability.healTurns}).`);
    } else {
      // spore_cloud-style: bloom on self (bench effect ignored in 1v1 single-enemy mode)
      applyStatus(attacker, 'bloom', { turns: 4, pct: 0.05 });
      pushLog(`${displayName(attacker.creature)} releases ${ability.name.toLowerCase()}.`);
    }
    sfx('heal');
  } else if (ability.kind === 'buff') {
    if (ability.effect === 'cleanse_self') {
      cleanseStatuses(attacker);
      attacker.statMods = { atk: 0, def: 0, spd: 0 };
      pushLog(`${displayName(attacker.creature)} is cleansed.`);
      sfx('heal');
      return;
    }
    for (const [k, v] of Object.entries(ability.statMult || {})) attacker.statMods[k] += v;
    pushLog(`${displayName(attacker.creature)} channels ${ability.name}.`);
    sfx('select');
  } else if (ability.kind === 'debuff') {
    // Pure status appliers (no damage). Use the named effect.
    pushLog(`${displayName(attacker.creature)} casts ${ability.name}.`);
    sfx('select');
    resolveAbilityEffect(side, oside, attacker, defender, ability, { dmg: 0 });
  } else if (ability.kind === 'charge_attack') {
    // Charge moves: turn 1 telegraphs, turn 2 fires automatically.
    // The attacker is the active fighter for `side`. Store charge intent on the right state slot.
    if (!attacker.charging) {
      // First turn — telegraph only
      attacker.charging = ability.key || ability;  // store the ability key for next-turn reference
      attacker.chargeAbility = ability;
      pushLog(`${displayName(attacker.creature)} is charging ${ability.name}!`, 'eff');
      sfx('select');
    } else {
      // Should not normally hit — release is dispatched directly by playerAct/aiChoose.
      // Fall through to immediate resolve as a safeguard.
      attacker.charging = null;
      attacker.chargeAbility = null;
      await releaseCharge(side, attacker, defender, ability);
    }
  } else if (ability.kind === 'swap_self') {
    // Swap to bench. The incoming creature is the bench fighter for this side.
    // Buffs and heals apply IMMEDIATELY so they're in effect on this same turn (not next turn).
    const benchFighter = side === 'player' ? state.bf : state.ebf;
    if (!benchFighter || benchFighter.hp <= 0) {
      pushLog(`${displayName(attacker.creature)} tried to swap, but no ally is ready.`, 'eff');
      return;
    }
    // Cursed-on-swap-out triggers on the swapping creature
    applyCursedOnSwap(attacker, side);
    pushLog(`${displayName(attacker.creature)} swaps out via ${ability.name}.`, 'eff');
    sfx('select');
    // Perform the swap
    if (side === 'player') {
      const out = state.pf;
      state.pf = state.bf;
      state.bf = out;
      state.activeIdx = 1 - state.activeIdx;
      state.pCharge = null;
    } else {
      const out = state.ef;
      state.ef = state.ebf;
      state.ebf = out;
      state.enemyActiveIdx = 1 - state.enemyActiveIdx;
      state.enemy = state.enemyParty[state.enemyActiveIdx];
      state.eCharge = null;
    }
    // benchFighter is now the active (state.pf or state.ef). Apply buffs/heals immediately.
    const incoming = benchFighter;
    if (ability.buffOnSwap) {
      for (const [k, v] of Object.entries(ability.buffOnSwap)) incoming.statMods[k] += v;
      pushLog(`${displayName(incoming.creature)} arrives bolstered.`, 'eff');
    }
    if (ability.healOnSwap) {
      const amt = Math.round(incoming.creature.maxHp * ability.healOnSwap);
      const healed = applyHeal(incoming, amt);
      if (healed > 0) {
        spawnFloat(side, `+${healed}`, 'heal');
        pushLog(`${displayName(incoming.creature)} arrives healed for ${healed}.`);
      }
    }
    // Vanguard passive: incoming gets +50% atk for the turn
    if (hasPassive(incoming, 'vanguard')) {
      incoming.statMods.atk += 0.5;
      incoming.vanguardActive = true;
      pushLog(`${displayName(incoming.creature)}'s Vanguard surges forward!`, 'eff');
    }
    // Second Wind: heal 15% on swap-in
    if (hasPassive(incoming, 'second_wind')) {
      const healed = applyHeal(incoming, Math.round(incoming.creature.maxHp * 0.15));
      if (healed > 0) {
        spawnFloat(side, `+${healed}`, 'heal');
        pushLog(`${displayName(incoming.creature)}'s Second Wind heals ${healed}.`);
      }
    }
    // Tag Out: cleanse incoming
    if (hasPassive(attacker, 'tag_out')) {
      cleanseStatuses(incoming);
      pushLog(`Tag Out cleanses ${displayName(incoming.creature)}.`, 'eff');
    }
    // Mark bench/active flags for Rearguard passive
    incoming.onBench = false;
    attacker.onBench = true;
  } else if (ability.kind === 'bench_support') {
    // Heal/buff/cleanse the bench creature on this side. No swap.
    const benchFighter = side === 'player' ? state.bf : state.ebf;
    if (!benchFighter) {
      pushLog(`${displayName(attacker.creature)} casts ${ability.name}, but has no ally to support.`, 'eff');
      return;
    }
    pushLog(`${displayName(attacker.creature)} aids the bench with ${ability.name}.`, 'eff');
    sfx('heal');
    if (ability.effect === 'bench_bloom') {
      applyStatus(benchFighter, 'bloom', { turns: 4, pct: 0.06 });
    } else if (ability.effect === 'bench_buff_atk') {
      benchFighter.statMods.atk += 0.25;
    } else if (ability.effect === 'bench_buff_def') {
      benchFighter.statMods.def += 0.30;
    } else if (ability.effect === 'bench_cleanse') {
      cleanseStatuses(benchFighter);
    } else if (ability.effect === 'bench_heal') {
      const healed = applyHeal(benchFighter, Math.round(benchFighter.creature.maxHp * 0.30));
      if (healed > 0) pushLog(`${displayName(benchFighter.creature)} heals ${healed} on the bench.`);
    }
  }
}

// Release a charged ability — used when a charging fighter's turn comes around.
async function releaseCharge(side, attacker, defender, ability) {
  const oside = side === 'player' ? 'enemy' : 'player';
  pushLog(`${displayName(attacker.creature)} unleashes ${ability.name}!`, 'eff');
  playLunge(side);
  await sleep(220);
  if (ability.power && ability.power > 0) {
    const hits = ability.hits || 1;
    for (let h = 0; h < hits; h++) {
      if (defender.hp <= 0) break;
      const result = calculateDamage(attacker, defender, ability);
      if (result.evaded) {
        spawnFloat(oside, 'EVADE', 'heal');
        sfx('select');
        pushLog(`${displayName(defender.creature)} evades!`, 'eff');
        continue;
      }
      defender.hp = Math.max(0, defender.hp - result.dmg);
      spawnFloat(oside, String(result.dmg), result.crit ? 'crit' : 'dmg');
      if (result.crit) sfx('crit'); else sfx('hit');
      shakeStage(); playRecoil(oside);
      pushLog(`Deals ${result.dmg} damage${result.crit ? ' (CRIT)' : ''}.`, result.crit ? 'crit' : '');
      processPostHit(side, oside, attacker, defender, ability, result);
      resolveAbilityEffect(side, oside, attacker, defender, ability, result);
    }
  } else {
    // Damage-less charges (Hex, Tidal Pull) — apply effect directly.
    resolveAbilityEffect(side, oside, attacker, defender, ability, { dmg: 0 });
  }
}

function finishBattleIfDone() {
  if (state.wave === TOTAL_WAVES) {
    state.screen = 'victory';
    sfx('victory');
    render();
    return;
  }
  // XP based on sum of enemy levels — killing high-level enemies pays out big.
  // Tuned so a L20 enemy gives ~120 XP per defeated, total ~240 XP per wave for 2 enemies.
  // At L1→L2 (25 XP needed), one wave is ~10 levels. At L40→L41 (1000 XP needed), one wave is ~25%.
  const totalEnemyLevel = state.enemyParty.reduce((sum, e) => sum + e.level, 0);
  const xpGained = Math.round(totalEnemyLevel * 6 + 20);
  const xpReports = [];
  let anyLeveled = false;
  // Award XP to ALL party members AND ALL reserve creatures.
  // The user spec: "every monster even your reserves should get exp every fight".
  const allCreatures = [...state.party, ...state.reserve];
  for (const c of allCreatures) {
    const events = gainXp(c, xpGained);
    if (events.length) anyLeveled = true;
    xpReports.push({ creature: c, levelEvents: events, isReserve: !state.party.includes(c) });
  }
  if (anyLeveled) sfx('levelup');
  state.postBattleEvents = {
    xpGained,
    xpReports,
    capturedChoices: [...state.enemyParty], // player picks one — captures at the level it died at
    capturedSelected: null,
  };
  state.screen = 'aftermath';
  for (const c of state.party) c.maxHp = c.stats.hp;
  render();
}

function renderAftermath() {
  const panel = el('div', { class: 'panel' });
  panel.appendChild(el('div', { class: 'panel-title' }, `Wave ${state.wave} cleared`));
  const ev = state.postBattleEvents;
  panel.appendChild(el('div', { style: 'color: var(--text-dim); font-size: 12px; margin-bottom: 8px;' },
    `Each member of your bloodline gained ${ev.xpGained} XP.`));
  for (const rep of ev.xpReports) {
    const c = rep.creature;
    const wrapper = el('div', { style: 'margin-bottom: 8px;' });
    if (rep.levelEvents.length) {
      for (const lev of rep.levelEvents) {
        const lc = el('div', { class: 'levelup-card' });
        lc.appendChild(el('div', { class: 'levelup-line' }, `${displayName(c)} — LEVEL UP! → L${lev.level}`));
        const dl = el('div', { class: 'levelup-deltas' });
        for (const [k, v] of Object.entries(lev.deltas)) {
          dl.appendChild(el('span', { class: 'delta' }, `+${v} ${k.toUpperCase()}`));
        }
        lc.appendChild(dl);
        wrapper.appendChild(lc);
      }
    }
    wrapper.appendChild(creatureCardEl(c));
    panel.appendChild(wrapper);
  }

  // Capture-one selection
  panel.appendChild(el('div', { style: 'margin-top: 14px; color: var(--text-dim); font-size: 12px;' },
    'Capture one of the defeated. Long-press a card for full details.'));
  for (const candidate of ev.capturedChoices) {
    panel.appendChild(creatureCardEl(candidate, {
      selectable: true,
      selected: ev.capturedSelected && ev.capturedSelected.id === candidate.id,
      onclick: () => {
        ev.capturedSelected = candidate;
        render();
      },
    }));
  }

  const continueBtn = el('button', { class: 'primary', style: 'margin-top: 12px;' },
    ev.capturedSelected ? 'Continue' : 'Pick a creature to capture');
  if (!ev.capturedSelected) continueBtn.disabled = true;
  if (ev.capturedSelected) {
    continueBtn.addEventListener('click', () => {
      sfx('capture');
      state.reserve.push(ev.capturedSelected);
      if (BREED_WAVES.has(state.wave)) {
        state.breedState = {
          stage: 'pick_pair_1',
          pool: [...state.party, ...state.reserve],
          picks: [],
          currentPair: [],
        };
        state.screen = 'breed';
        render();
      } else {
        advanceWave();
      }
    });
  }
  panel.appendChild(continueBtn);

  app().appendChild(panel);
}

function advanceWave() {
  state.wave++;
  if (state.wave > TOTAL_WAVES) { state.screen = 'victory'; render(); return; }
  state.enemyParty = state.wave === TOTAL_WAVES
    ? generateBossParty(partyAvgLevel(state.party))
    : generateEnemyParty(state.wave, partyAvgLevel(state.party));
  state.enemyActiveIdx = 0;
  state.enemy = state.enemyParty[0];
  for (const c of state.party) c.maxHp = c.stats.hp;
  state.screen = 'prebattle';
  render();
}

function renderBreed() {
  const panel = el('div', { class: 'panel' });
  panel.appendChild(el('div', { class: 'panel-title' }, 'The Bloodline Ritual'));
  const bs = state.breedState;

  if (bs.stage === 'pick_pair_1' || bs.stage === 'pick_pair_2') {
    const pairIdx = bs.stage === 'pick_pair_1' ? 0 : 1;
    const used = new Set();
    for (const pair of bs.picks) for (let i = 0; i < 2; i++) used.add(pair[i].id);
    const currentPair = bs.currentPair || [];
    panel.appendChild(el('p', { style: 'color: #8a8a98; font-size: 12px; margin-bottom: 8px;' },
      `Choose pair ${pairIdx + 1} of 2 — pick two parents (${currentPair.length}/2). They will produce one child. The unchosen creature will be released.`
    ));
    for (const c of bs.pool) {
      const pickedNow = currentPair.find(p => p.id === c.id);
      const pickedEarlier = used.has(c.id);
      panel.appendChild(creatureCardEl(c, {
        selectable: !pickedEarlier,
        selected: !!pickedNow,
        dimmed: pickedEarlier,
        onclick: pickedEarlier ? null : () => {
          if (pickedNow) bs.currentPair = currentPair.filter(p => p.id !== c.id);
          else if (currentPair.length < 2) bs.currentPair = [...currentPair, c];
          if ((bs.currentPair || []).length === 2) {
            bs.stage = pairIdx === 0 ? 'config_pair_1' : 'config_pair_2';
            const [pa, pb] = bs.currentPair;
            bs.abilityOptions = Array.from(new Set([...pa.abilities, ...pb.abilities]));
            // Build passive options as {key, owner} so we can track which parent owns each.
            // Dedupe by key but if both parents share a passive, label its owner as 'both'.
            const pmap = {};
            for (const k of pa.passives || []) {
              if (k) pmap[k] = pmap[k] === 'b' ? 'both' : 'a';
            }
            for (const k of pb.passives || []) {
              if (k) pmap[k] = pmap[k] === 'a' ? 'both' : (pmap[k] === 'both' ? 'both' : 'b');
            }
            bs.passiveOptions = Object.entries(pmap).map(([key, owner]) => ({ key, owner }));
            bs.chosenAbilities = [];
            bs.chosenPassives = []; // ordered: first picked determines species
          }
          render();
        },
      }));
    }
    app().appendChild(panel);
    return;
  }

  if (bs.stage === 'config_pair_1' || bs.stage === 'config_pair_2') {
    const pairIdx = bs.stage === 'config_pair_1' ? 0 : 1;
    const [pa, pb] = bs.currentPair;
    panel.appendChild(el('p', { style: 'color: #8a8a98; font-size: 12px; margin-bottom: 8px;' },
      `Configure offspring for pair ${pairIdx + 1}. Pick 4 abilities and 2 passives. The first passive picked determines the offspring's shape.`
    ));
    // Back button — return to pair selection. Wipes choice state for this pair only.
    panel.appendChild(el('button', {
      style: 'font-size: 11px; padding: 5px 10px; margin-bottom: 8px; background: transparent; color: var(--text-dim); border: 1px solid var(--border);',
      onclick: () => {
        bs.stage = pairIdx === 0 ? 'pick_pair_1' : 'pick_pair_2';
        bs.currentPair = [];
        bs.chosenAbilities = [];
        bs.chosenPassives = [];
        render();
      },
    }, '← Pick different parents'));
    const parents = el('div', { class: 'roster-grid' });
    parents.appendChild(creatureCardEl(pa, { showGrowths: true }));
    parents.appendChild(creatureCardEl(pb, { showGrowths: true }));
    panel.appendChild(parents);

    panel.appendChild(el('div', { style: 'margin-top: 14px; font-size: 11px; letter-spacing: 1px; color: var(--accent);' }, `ABILITIES (${bs.chosenAbilities.length}/4)`));
    const aRow = el('div', { style: 'display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px;' });
    for (const k of bs.abilityOptions) {
      const picked = bs.chosenAbilities.includes(k);
      aRow.appendChild(el('button', {
        class: 'ability-pick-btn' + (picked ? ' picked' : ''),
        style: picked ? 'background: linear-gradient(180deg, #5a4a2a, #4a3a1a); border-color: var(--accent); font-size: 11px; padding: 5px 9px;' : 'font-size: 11px; padding: 5px 9px;',
        onclick: () => {
          if (picked) bs.chosenAbilities = bs.chosenAbilities.filter(x => x !== k);
          else if (bs.chosenAbilities.length < 4) bs.chosenAbilities.push(k);
          render();
        },
      }, ABILITIES[k].name));
    }
    panel.appendChild(aRow);

    panel.appendChild(el('div', { style: 'margin-top: 14px; font-size: 11px; letter-spacing: 1px; color: var(--accent);' }, `PASSIVES (${bs.chosenPassives.length}/2)`));
    panel.appendChild(el('div', { style: 'color: var(--text-faint); font-size: 10px; margin-top: 2px; margin-bottom: 6px;' }, 'Pick 2 — first pick determines the offspring\'s species (shape).'));
    const pRow = el('div', { style: 'display: flex; gap: 6px; flex-wrap: wrap;' });
    for (const opt of bs.passiveOptions) {
      const k = opt.key;
      const picked = bs.chosenPassives.includes(k);
      const idx = bs.chosenPassives.indexOf(k);
      const p = PASSIVES[k];
      // owner tag for clarity
      const ownerLabel = opt.owner === 'a' ? pa.species
                       : opt.owner === 'b' ? pb.species
                       : `${pa.species}/${pb.species}`;
      pRow.appendChild(el('button', {
        class: picked ? 'picked' : '',
        style: picked ? 'background: linear-gradient(180deg, #5a4a2a, #4a3a1a); border-color: var(--accent); font-size: 11px; padding: 5px 9px;' : 'font-size: 11px; padding: 5px 9px;',
        title: (p ? p.desc : '') + ` (from ${ownerLabel})`,
        onclick: () => {
          if (picked) bs.chosenPassives = bs.chosenPassives.filter(x => x !== k);
          else if (bs.chosenPassives.length < 2) bs.chosenPassives.push(k);
          render();
        },
      }, [
        p ? '◆ ' + p.name : k,
        idx === 0 ? el('span', { style: 'color: var(--accent); font-size: 9px; margin-left: 6px; letter-spacing: 1px;' }, '· SHAPE') : null,
      ].filter(Boolean)));
    }
    panel.appendChild(pRow);

    if (bs.chosenAbilities.length === 4 && bs.chosenPassives.length === 2) {
      // First-picked passive determines species: find owner.
      const firstPick = bs.chosenPassives[0];
      const firstOpt = bs.passiveOptions.find(o => o.key === firstPick);
      // 'both' falls back to parent A by convention
      const speciesFromB = firstOpt && firstOpt.owner === 'b';
      const child = makeChild(pa, pb, bs.chosenAbilities, bs.chosenPassives, speciesFromB);
      const preview = el('div', { class: 'breed-preview' });
      preview.appendChild(el('div', { style: 'font-size: 11px; color: var(--accent); letter-spacing: 2px; margin-bottom: 8px;' }, 'OFFSPRING PREVIEW'));
      preview.appendChild(creatureCardEl(child, { showGrowths: true }));
      panel.appendChild(preview);
      panel.appendChild(el('button', { class: 'primary', style: 'margin-top: 12px;', onclick: () => {
        sfx('victory');
        bs.picks.push([pa, pb, child]);
        bs.currentPair = [];
        if (pairIdx === 0) {
          bs.stage = 'pick_pair_2';
          render();
        } else {
          finalizeBreed();
        }
      } }, 'Confirm Birth'));
    }
    app().appendChild(panel);
    return;
  }

  app().appendChild(panel);
}

// Breed a child from two parents.
// New model:
//   - Child starts at level 1.
//   - Level-1 stats = average of parents' CURRENT stats (so leveled parents make stronger newborns).
//   - Growth rates BLENDED: shape-parent's growth weighted 65%, other parent 35%.
//     This gives the child a recognizable identity but lets the second parent skew the build.
//   - Child gets catch-up XP at birth: ~60% of the average parent level's worth of cumulative XP.
//     This lands the child somewhere around (avg_parent_level - 1) so it can hold its own
//     immediately after breed without entirely undoing the "fresh start" framing.
//   - Species/type follow the speciesFromB flag (whichever parent owns the first picked passive).
//   - Palette blends.
function makeChild(pa, pb, abilities, passives, speciesFromB) {
  const speciesSource = speciesFromB ? pb : pa;
  const otherParent  = speciesFromB ? pa : pb;
  const template = TEMPLATES.find(t => t.species === speciesSource.species);
  const palette = blendPalettes(pa.palette, pb.palette);
  // Blend growths: 65% shape parent + 35% other parent. Tilts identity toward the species/shape parent
  // while letting the second parent meaningfully shift the profile (you can build all-rounders by
  // breeding monomaniacs, or double down by breeding two of the same archetype).
  const growth = {
    hp:  speciesSource.growth.hp  * 0.65 + otherParent.growth.hp  * 0.35,
    atk: speciesSource.growth.atk * 0.65 + otherParent.growth.atk * 0.35,
    def: speciesSource.growth.def * 0.65 + otherParent.growth.def * 0.35,
    spd: speciesSource.growth.spd * 0.65 + otherParent.growth.spd * 0.35,
  };
  // Level-1 stats = average of parent CURRENT stats with a touch of variance (+/- 5%).
  const variance = (n) => Math.round(n * (rand(-0.05, 0.05)));
  const stats = {
    hp:  Math.max(8, Math.round((pa.stats.hp  + pb.stats.hp ) / 2) + variance(8)),
    atk: Math.max(2, Math.round((pa.stats.atk + pb.stats.atk) / 2) + variance(3)),
    def: Math.max(1, Math.round((pa.stats.def + pb.stats.def) / 2) + variance(3)),
    spd: Math.max(1, Math.round((pa.stats.spd + pb.stats.spd) / 2) + variance(3)),
  };
  const child = {
    id: creatureIdCounter++,
    species: template.species,
    type: speciesSource.type,
    growth,
    level: 1,
    xp: 0,
    stats,
    maxHp: stats.hp,
    abilities,
    passives,
    palette,
    customName: null,
  };
  return child;
}

function finalizeBreed() {
  const removeIds = new Set();
  for (const pair of state.breedState.picks) for (let i = 0; i < 2; i++) removeIds.add(pair[i].id);
  state.party = state.party.filter(c => !removeIds.has(c.id));
  state.reserve = state.reserve.filter(c => !removeIds.has(c.id));
  // any remaining (the unpicked 5th) — release
  state.party = [];
  state.reserve = [];
  // new party = the 2 children
  const newParty = state.breedState.picks.map(p => p[2]);
  state.party = newParty;
  // name children
  let i = 0;
  const nameNext = () => {
    if (i >= newParty.length) {
      state.breedState = null;
      advanceWave();
      return;
    }
    // Children keep their auto-generated species name. Naming UI removed for now.
    i++;
    nameNext();
  };
  nameNext();
}

function renderVictory() {
  const panel = el('div', { class: 'panel' });
  panel.appendChild(el('div', { class: 'panel-title' }, 'You triumphed.'));
  const all = [...state.party, ...state.reserve];
  const maxLvl = all.reduce((a,c)=>Math.max(a,c.level),0);
  panel.appendChild(el('p', { style: 'color: var(--text-dim); font-size: 13px; line-height: 1.6; margin-bottom: 12px;' },
    `The bloodline endures. Reached wave ${state.wave} of ${TOTAL_WAVES}, with ${all.length} creature(s), top level L${maxLvl}.`));
  for (const c of state.party) panel.appendChild(creatureCardEl(c));
  panel.appendChild(el('button', { class: 'primary', style: 'margin-top: 16px;', onclick: () => { resetGame(); render(); } }, 'New Run'));
  app().appendChild(panel);
}

function renderGameover() {
  const panel = el('div', { class: 'panel' });
  panel.appendChild(el('div', { class: 'panel-title' }, 'The bloodline withers.'));
  panel.appendChild(el('p', { style: 'color: var(--text-dim); font-size: 13px; line-height: 1.6;' },
    `Your fighter fell at wave ${state.wave}. The bloodline is broken.`));
  panel.appendChild(el('button', { class: 'primary', style: 'margin-top: 16px;', onclick: () => { resetGame(); render(); } }, 'New Run'));
  app().appendChild(panel);
}

function resetGame() {
  state.wave = 0;
  state.party = [];
  state.reserve = [];
  state.activeIdx = 0;
  state.enemy = null;
  state.enemyParty = [];
  state.enemyActiveIdx = 0;
  state.pf = null; state.bf = null; state.ef = null; state.ebf = null;
  state.pCharge = null; state.eCharge = null;
  state.log = [];
  state.breedState = null;
  state.postBattleEvents = null;
  state.acting = false;
  state.screen = 'start';
}

// ============================================================
// MODAL — name input
// ============================================================

function openNameModal({ creature, title, onConfirm }) {
  const root = document.getElementById('modal-root');
  root.innerHTML = '';
  const bg = el('div', { class: 'modal-bg' });
  const m = el('div', { class: 'modal' });
  m.appendChild(el('h2', {}, title));
  m.appendChild(creatureCardEl(creature));
  const input = el('input', { type: 'text', placeholder: `Default: ${displayName(creature)}`, maxlength: '20' });
  m.appendChild(input);
  const actions = el('div', { class: 'modal-actions' });
  const skip = el('button', { onclick: () => { root.innerHTML = ''; onConfirm(null); } }, 'Skip');
  const ok = el('button', { class: 'primary', onclick: () => { const v = input.value.trim(); root.innerHTML = ''; onConfirm(v || null); } }, 'Name it');
  actions.appendChild(skip); actions.appendChild(ok);
  m.appendChild(actions);
  bg.appendChild(m);
  root.appendChild(bg);
  setTimeout(() => input.focus(), 30);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); ok.click(); }
    if (e.key === 'Escape') { e.preventDefault(); skip.click(); }
  });
}

// ============================================================
// BOOT
// ============================================================

render();

</script>
